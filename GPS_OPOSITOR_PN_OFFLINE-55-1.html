// #60 MODO COMPETICIÓN — Simulación pruebas físicas PN
// ═══════════════════════════════════════════════════════════
let competicionState = { activo:false, prueba:null, cronometroActivo:false, tiempoMs:0, timerRef:null, reps:0 };

function renderModoCompeticion() {
  return `
    <div class="card accent">
      <div class="card-title">🏃 MODO COMPETICIÓN — Pruebas físicas PN</div>
      <p style="font-size:12px;color:var(--greyM);margin-bottom:10px">Simula cada prueba con cronómetro real y evaluación automática.</p>
      <label>Prueba a simular</label>
      <select id="compPrueba">
        <option value="1km">🏃 1.000 metros</option>
        <option value="dominadas">💪 Dominadas (máximas)</option>
        <option value="abdominales">🔢 Abdominales (1 minuto)</option>
        <option value="psc">🎽 PSC / Circuito de agilidad</option>
      </select>
      <button class="btn btn-primary" id="btnIniciarCompeticion">🏁 Iniciar prueba</button>
    </div>
    <div id="competicionOutput"></div>`;
}

function bindModoCompeticion() {
  const btnIni = document.getElementById("btnIniciarCompeticion");
  if (!btnIni) return;
  btnIni.onclick = () => {
    const prueba = document.getElementById("compPrueba").value;
    competicionState = { activo:true, prueba, cronometroActivo:false, tiempoMs:0, timerRef:null, reps:0, inicio:null };
    renderCompeticionPrueba();
  };
}

function renderCompeticionPrueba() {
  const { prueba, cronometroActivo, tiempoMs, reps } = competicionState;
  const seg = Math.floor(tiempoMs/1000);
  const mm = String(Math.floor(seg/60)).padStart(2,"0");
  const ss = String(seg%60).padStart(2,"0");
  const ms = String(Math.floor((tiempoMs%1000)/10)).padStart(2,"0");
  const minutos1kmActual = seg > 0 ? `${mm}:${ss}` : "—";
  let html = `<div class="card" style="text-align:center">
    <div style="font-size:48px;font-weight:900;color:var(--gold);font-family:Georgia,monospace;margin:10px 0">${mm}:${ss}<span style="font-size:24px">.${ms}</span></div>`;
  if (prueba === "dominadas" || prueba === "abdominales") {
    html += `<div style="font-size:36px;font-weight:900;color:var(--white);margin-bottom:10px">${reps} reps</div>
      <button class="btn btn-primary" id="btnSumarRep" style="font-size:20px;padding:16px 40px">+1</button>`;
  }
  html += `<div class="btn-row" style="margin-top:14px">
    <button class="btn ${cronometroActivo?"btn-danger":"btn-primary"}" id="btnToggleCrono" style="flex:1">${cronometroActivo?"⏸ Parar":"▶ Iniciar"}</button>
    <button class="btn btn-ghost" id="btnResetCrono" style="flex:1">↺ Reset</button>
    ${seg > 0 ? `<button class="btn btn-secondary" id="btnGuardarCompeticion" style="flex:1">💾 Guardar</button>` : ""}
  </div>`;
  if (prueba === "1km" && seg > 0) {
    const ritmos = calcularRitmosCarrera(seg);
    html += `<div style="margin-top:12px;text-align:left"><div style="font-size:11px;font-weight:700;color:var(--gold);margin-bottom:6px">Ritmos de entrenamiento basados en este resultado:</div>
      ${Object.entries(ritmos).map(([k,v]) => `<div style="font-size:11px;display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border)"><span>${k}</span><span style="color:var(--gold);font-weight:700">${fmtRitmo(v)}</span></div>`).join("")}</div>`;
  }
  html += `</div>`;
  document.getElementById("competicionOutput").innerHTML = html;

  document.getElementById("btnToggleCrono").onclick = () => {
    if (!competicionState.cronometroActivo) {
      competicionState.cronometroActivo = true;
      competicionState.inicio = Date.now() - competicionState.tiempoMs;
      competicionState.timerRef = setInterval(() => {
        competicionState.tiempoMs = Date.now() - competicionState.inicio;
        renderCompeticionPrueba();
      }, 50);
    } else {
      competicionState.cronometroActivo = false;
      clearInterval(competicionState.timerRef);
      renderCompeticionPrueba();
    }
  };
  document.getElementById("btnResetCrono").onclick = () => {
    clearInterval(competicionState.timerRef);
    competicionState = { ...competicionState, cronometroActivo:false, tiempoMs:0, reps:0, inicio:null };
    renderCompeticionPrueba();
  };
  const btnSumar = document.getElementById("btnSumarRep");
  if (btnSumar) btnSumar.onclick = () => { competicionState.reps++; renderCompeticionPrueba(); };
  const btnGuardar = document.getElementById("btnGuardarCompeticion");
  if (btnGuardar) btnGuardar.onclick = () => {
    const resultado = prueba === "1km" ? `${mm}:${ss} min` : `${reps} reps`;
    guardarApunte({ temas:[], tipo:"resumen", titulo:`Prueba ${prueba.toUpperCase()} — ${resultado}`, contenido:`Fecha: ${new Date().toLocaleDateString("es-ES")}\nPrueba: ${prueba}\nResultado: ${resultado}\nTiempo cronómetro: ${mm}:${ss}.${ms}` });
    if (prueba === "1km") saveState({ min1km: seg });
    if (prueba === "dominadas") { const sesiones = [...(STATE.sesiones||[]), { fecha:new Date().toISOString(), reps:reps, tipo:"prueba" }]; saveState({ sesiones }); }
    toast(`✅ ${resultado} guardado`);
  };
}

// ═══════════════════════════════════════════════════════════
// #19 CALCULADORA DE HIDRATACIÓN
// ═══════════════════════════════════════════════════════════
function calcularHidratacion(pesoKg, tipoEntreno, temperatura) {
  const base = parseFloat(pesoKg) * 35;
  const extraEntreno = { descanso:0, dominadas:300, carrera:500, fuerza:300, circuito:600, simulacro:700, doble:800 }[tipoEntreno] || 0;
  const extraCalor = temperatura > 25 ? (temperatura - 25) * 100 : 0;
  return Math.round(base + extraEntreno + extraCalor);
}

// ═══════════════════════════════════════════════════════════
// #64 SEGUIMIENTO DE PESO CORPORAL
// ═══════════════════════════════════════════════════════════
function renderSeguimientoPeso() {
  const registros = STATE.pesoCorporal || [];
  const ultimos = registros.slice(-20);
  return `
    <div class="card">
      <div class="card-title">⚖️ SEGUIMIENTO DE PESO</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <input type="number" id="nuevoPeso" placeholder="Peso hoy (kg)" step="0.1">
        <button class="btn btn-primary sm" id="btnGuardarPeso">💾 Guardar</button>
      </div>
      ${ultimos.length >= 2 ? (() => {
        const primero = parseFloat(ultimos[0].peso);
        const ultimo = parseFloat(ultimos[ultimos.length-1].peso);
        const diff = (ultimo - primero).toFixed(1);
        const color = diff > 0 ? "var(--gold)" : diff < 0 ? "var(--green)" : "var(--greyM)";
        return `<div style="font-size:12px;color:${color};margin-bottom:10px">Tendencia: ${diff > 0 ? "+" : ""}${diff}kg en ${ultimos.length} registros · Actual: ${ultimo}kg</div>`;
      })() : ""}
      ${ultimos.length > 0 ? `<div style="max-height:200px;overflow-y:auto">
        ${ultimos.slice().reverse().map(r => `<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
          <span>${new Date(r.fecha).toLocaleDateString("es-ES")}</span>
          <span style="font-weight:700;color:var(--gold)">${r.peso} kg</span>
        </div>`).join("")}
      </div>` : `<div style="font-size:12px;color:var(--greyM);text-align:center">Empieza a registrar tu peso cada mañana en ayunas.</div>`}
    </div>`;
}

// ═══════════════════════════════════════════════════════════
// #61 BATCH COOKING desde el menú
// ═══════════════════════════════════════════════════════════
async function generarBatchCooking(perfil) {
  const fav = STATE.alimentosFav || [];
  const objetivo = perfil.objetivo === "definir" ? "definición" : perfil.objetivo === "volumen" ? "volumen" : "mantenimiento";
  const prompt = `Eres Dani, coach de nutrición. Genera un plan de batch cooking semanal (para preparar el domingo) basado en este perfil: ${perfil.peso}kg, ${perfil.altura}cm, ${perfil.sexo||"hombre"}, objetivo ${objetivo}, ${perfil.comidasDia||4} comidas/día.${fav.length ? ` Alimentos favoritos: ${fav.join(", ")}.` : ""}

Estructura el plan así:
**QUÉ COCINAR EL DOMINGO** (lista con cantidades totales para toda la semana)
**TUPPERS DE LA SEMANA** (qué va en cada tupper, cómo se organiza)
**ORDEN DE PREPARACIÓN** (pasos en orden de menor a mayor tiempo de cocción)
**TIEMPO TOTAL ESTIMADO**

Pesos en crudo. Todo concreto y accionable.`;
  return await callClaude(prompt, 2000);
}

// ═══════════════════════════════════════════════════════════
// #37 SWIPE ENTRE PESTAÑAS
// ═══════════════════════════════════════════════════════════
function initSwipe() {
  let startX = 0, startY = 0;
  const TABS_ORDER = ["gps","foto","mnemo","apuntes","test","trampa","repaso","major","flash","fisico","plan","stats"];
  document.addEventListener("touchstart", e => { startX = e.touches[0].clientX; startY = e.touches[0].clientY; }, { passive:true });
  document.addEventListener("touchend", e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if (Math.abs(dx) < 60 || dy > 60) return; // no era un swipe horizontal limpio
    const cur = TABS_ORDER.indexOf(currentTab);
    if (dx < 0 && cur < TABS_ORDER.length - 1) switchTab(TABS_ORDER[cur + 1]);
    else if (dx > 0 && cur > 0) switchTab(TABS_ORDER[cur - 1]);
  }, { passive:true });
}

const RENDERERS = {
  gps: () => { document.getElementById("content").innerHTML = renderGPS(); bindGPS(); },
  foto: () => { document.getElementById("content").innerHTML = renderFoto(); bindFoto(); },
  mnemo: () => { mnemoVista="mias"; renderMnemo_(); },
  apuntes: () => { apuntesVistaDetalle = null; renderApuntes_(); },
  test: () => { testState = { fase:"config", preguntas:[], idx:0, correctas:0, fallos:0, respuesta:null, tiempo:0 }; renderTest_(); },
  simulacro: () => { simulacroState = { fase:"config" }; renderSimulacro_(); },
  trampa: () => renderTrampa_(),
  repaso: () => { repasoSelTema=null; renderRepaso_(); },
  major: () => renderMajor_(),
  flash: () => { flashState.activo=false; renderFlash_(); },
  fisico: () => renderFisico_(),
  plan: () => { planTipo="dieta"; renderPlan_(); },
  stats: () => renderStats_(),
};

function renderContent() {
  updateExamChip();
  try {
    (RENDERERS[currentTab] || RENDERERS.gps)();
  } catch (e) {
    console.error("Error en panel " + currentTab + ":", e);
    document.getElementById("content").innerHTML = `
      <div style="background:#fff5f5;border:2px solid var(--red);border-radius:10px;padding:20px;margin-top:10px">
        <div style="font-weight:900;font-size:15px;color:var(--red);margin-bottom:8px">⚠️ Error en la pestaña "${currentTab}"</div>
        <div style="font-size:12px;color:var(--text);font-family:monospace;white-space:pre-wrap;background:#f8f9fc;padding:10px;border-radius:6px">${esc(e.message)}\n\n${esc(e.stack||"").split("\n").slice(0,4).join("\n")}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="switchTab('gps')">← Volver al inicio</button>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════════════
// RECORDATORIO DIARIO — comprobación real (antes solo pedía permiso, nunca disparaba nada)
// Limitación honesta: esto solo funciona mientras la pestaña/app esté abierta en el móvil.
// ═══════════════════════════════════════════════════════════
function iniciarComprobadorRecordatorio() {
  setInterval(() => {
    if (!STATE.recordatorioActivo || typeof Notification === "undefined" || Notification.permission !== "granted") return;
    const ahora = new Date();
    const hoyISO = ahora.toISOString().split("T")[0];
    const horaActual = ahora.toTimeString().slice(0,5);
    if (horaActual === (STATE.horaRecordatorio || "19:00") && STATE.ultimaNotifFecha !== hoyISO) {
      try {
        new Notification("🧭 GPS Opositor PN", { body: "Toca repasar hoy. Abre la app y revisa tu Mapa del Temario.", icon: undefined });
      } catch (e) { console.error(e); }
      saveState({ ultimaNotifFecha: hoyISO });
    }
  }, 30000);
}

// ═══════════════════════════════════════════════════════════
// AVISO DE BACKUP — recuerda exportar si hace mucho que no se hace
// ═══════════════════════════════════════════════════════════
function diasDesdeUltimoBackup() {
  if (!STATE.ultimoBackup) return Infinity;
  return Math.floor((Date.now() - new Date(STATE.ultimoBackup).getTime()) / 86400000);
}

// ═══════════════════════════════════════════════════════════
// PWA — registra el Service Worker si la app se sirve desde http(s) (no funciona en file://)
// ═══════════════════════════════════════════════════════════
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(e => console.error("SW no registrado:", e));
  });
}


function mostrarPantallaBackup() {
  const dias = diasDesdeUltimoBackup();
  const esPrimera = dias === Infinity;
  document.getElementById("content").innerHTML = `
    <div style="min-height:80vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">${esPrimera ? "⚠️" : "🔒"}</div>
      <div style="font-weight:900;font-size:18px;color:var(--gold);margin-bottom:10px">
        ${esPrimera ? "Exporta tu primer backup antes de continuar" : `Han pasado ${dias} días sin backup`}
      </div>
      <div style="font-size:13px;color:var(--greyM);margin-bottom:24px;max-width:320px;line-height:1.6">
        Tienes semanas de trabajo guardadas en este móvil. Si Chrome limpia datos, lo pierdes todo. Exporta ahora — son 3 segundos.
      </div>
      <button class="btn btn-primary" id="btnBackupForzado" style="width:100%;max-width:320px;margin-bottom:12px">📁 Exportar backup ahora</button>
      ${dias > 0 && dias !== Infinity ? `<button class="btn btn-ghost" id="btnSaltarBackup" style="width:100%;max-width:320px;font-size:11px;color:var(--greyM)">Saltar (no recomendado)</button>` : ""}
    </div>`;
  document.getElementById("btnBackupForzado").onclick = () => {
    const blob = new Blob([JSON.stringify(STATE, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `gps_backup_${new Date().toISOString().split("T")[0]}.json`; a.click();
    saveState({ ultimoBackup: new Date().toISOString() });
    toast("✅ Backup exportado — guardándolo en Google Drive o en una carpeta segura");
    setTimeout(() => { renderContent(); }, 800);
  };
  const btnSaltar = document.getElementById("btnSaltarBackup");
  if (btnSaltar) btnSaltar.onclick = () => { saveState({ ultimoBackup: new Date().toISOString() }); renderContent(); };
}

try {
  applyFontScale();
  renderNav();
  initSwipe();
  const diasSinBackup = diasDesdeUltimoBackup();
  if (diasSinBackup > 3) {
    mostrarPantallaBackup();
  } else {
    renderContent();
  }
  iniciarComprobadorRecordatorio();
} catch (e) {
  document.getElementById("content").innerHTML = `
    <div style="background:#3a0a12;border:2px solid #c8102e;border-radius:8px;padding:20px;margin-top:20px">
      <div style="font-weight:900;font-size:16px;color:#ff8a9a;margin-bottom:10px">⚠️ Error al cargar la app</div>
      <div style="font-size:13px;color:#fff;font-family:monospace;white-space:pre-wrap;margin-bottom:10px">${(e && e.message ? e.message : "Error desconocido")}</div>
      <div style="font-size:12px;color:#ffd6dd">Mándale esto a Dani: ${(e && e.stack ? e.stack.split("\\n").slice(0,3).join(" | ") : "sin stack")}</div>
    </div>`;
  console.error("ERROR DE INICIALIZACIÓN:", e);
}
window.addEventListener("error", (ev) => {
  console.error("ERROR GLOBAL:", ev.error);
  const c = document.getElementById("content");
  if (c && !c.innerHTML.includes("Error al cargar")) {
    const errBox = document.createElement("div");
    errBox.style.cssText = "background:#3a0a12;border:2px solid #c8102e;border-radius:8px;padding:14px;margin:10px 0;font-size:12px;color:#ff8a9a;font-family:monospace;white-space:pre-wrap";
    errBox.textContent = "⚠️ Error: " + (ev.error?.message || ev.message || "desconocido");
    c.prepend(errBox);
  }
});



</script>
