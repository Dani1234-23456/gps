        <button class="btn btn-ghost sm" id="btnBloqueT">Todo Técnico</button>
        <button class="btn btn-ghost sm" id="btnBloqueLimpiar">Limpiar</button>
      </div>

      <select id="testDif">

      <div class="card-title">📊 TEMAS CON MÁS FALLOS</div>

      </div>`).join("")}` : ""}
  `;
}

function renderTestTemasList() {
  const el = document.getElementById("testTemasList");
  if (!el) return;
  el.innerHTML = TEMAS.map(t => {
    const sel = testTemasSeleccionados.includes(t.n);
    return `<div class="checkrow ${sel?"sel":""}" data-tema="${t.n}">
      <span class="checkbox ${sel?"on":""}">${sel?"✓":""}</span>
      <span style="font-size:12px">T${t.n} — ${esc(t.nombre)} ${t.prob==="Alta"?"🔴":t.prob==="Media"?"🟡":"🟢"}</span>
    </div>`;
  }).join("");
  el.querySelectorAll("[data-tema]").forEach(row => {
    row.onclick = () => {
      const n = parseInt(row.dataset.tema);
      testTemasSeleccionados = testTemasSeleccionados.includes(n) ? testTemasSeleccionados.filter(x=>x!==n) : [...testTemasSeleccionados, n];
      renderTestTemasList();
      document.getElementById("testTemasCount").textContent = `${testTemasSeleccionados.length} tema(s) seleccionado(s)`;
    };
  });
  document.getElementById("testTemasCount").textContent = `${testTemasSeleccionados.length} tema(s) seleccionado(s)`;
}

function bindTest() {
  if (testState.fase === "test") { bindTestEnCurso(); return; }
  if (testState.fase === "result") { bindTestResultado(); return; }
  renderTestTemasList();
  document.getElementById("btnBloqueJ").onclick = () => { testTemasSeleccionados = TEMAS.filter(t=>t.b==="J").map(t=>t.n); renderTestTemasList(); };
  document.getElementById("btnBloqueS").onclick = () => { testTemasSeleccionados = TEMAS.filter(t=>t.b==="S").map(t=>t.n); renderTestTemasList(); };
  document.getElementById("btnBloqueT").onclick = () => { testTemasSeleccionados = TEMAS.filter(t=>t.b==="T").map(t=>t.n); renderTestTemasList(); };
  document.getElementById("btnBloqueLimpiar").onclick = () => { testTemasSeleccionados = []; renderTestTemasList(); };

  document.getElementById("btnGenerarTest").onclick = async () => {
    if (testTemasSeleccionados.length === 0) { toast("Selecciona al menos un tema"); return; }
    const numQ = document.getElementById("testNumQ").value;
    const fuente = document.getElementById("testFuente").value;
    const dif = document.getElementById("testDif").value;
    const btn = document.getElementById("btnGenerarTest");
    btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Cargando test...`;

    let qs = [];
    const temasObj = testTemasSeleccionados.map(n => TEMAS.find(t=>t.n===n)).filter(Boolean);
    const realesDeTemas = PREGUNTAS_REALES.filter(p => testTemasSeleccionados.includes(p.tema));
    if (fuente === "reales" || fuente === "mixto") qs = [...realesDeTemas];
    if (fuente === "foto" || fuente === "mixto") {
      const fotoQs = (STATE.fotoTests||[]).filter(q => testTemasSeleccionados.includes(q.tema)).map(q=>({...q,fuente:"foto"}));
      qs = [...qs, ...fotoQs];
    }
    if (fuente === "ia" || (fuente === "mixto" && qs.length < parseInt(numQ))) {
      const necesito = parseInt(numQ) - qs.length;
      if (necesito > 0) {
        const listaTemas = temasObj.map(t=>`T${t.n} — ${t.nombre}`).join(", ");
        const prompt = `Genera ${necesito} preguntas tipo test NUEVAS repartidas entre estos temas de oposición PN: ${listaTemas}. Reparte equilibradamente e indica a qué tema pertenece cada una.
${dif==="trampa"?"Incluye trampas frecuentes de examen PN.":dif==="hard"?"Difícil: excepciones, detalles.":"Nivel normal, BOE."}
Solo 3 opciones (A,B,C). Responde SOLO JSON: [{"tema":0,"preg":"texto","ops":{"A":"texto","B":"texto","C":"texto"},"ok":"A","exp":"texto","ley":"ley","art":0}]
El campo tema debe ser uno de: ${testTemasSeleccionados.join(", ")}.`;
        try {
          const res = await callClaude(prompt, 2500);
          const parsed = safeJsonParse(res);
          if (!parsed) toast("⚠️ La IA no devolvió un test válido");
          else qs = [...qs, ...parsed.map(q=>({tema:q.tema||testTemasSeleccionados[0],pregunta:q.preg,opciones:q.ops,correcta:q.ok,explicacion:q.exp,ley:q.ley,art:q.art,fuente:"ia"}))];
        } catch(e) { toast("⚠️ " + e.message); }
      }
    }
    if (qs.length === 0) { toast("⚠️ No se pudo generar ningún test"); btn.disabled=false; btn.innerHTML="🎯 Generar test"; return; }
    qs = qs.sort(()=>Math.random()-.5).slice(0, parseInt(numQ));
    testState = { fase:"test", preguntas:qs, idx:0, correctas:0, fallos:0, respuesta:null, tiempo:0 };
    renderTest_();
    testState.timer = setInterval(() => { testState.tiempo++; const el=document.getElementById("testTiempo"); if(el) el.textContent=fmtSecs(testState.tiempo); }, 1000);
    btn.disabled=false; btn.innerHTML="🎯 Generar test";
  };
}

function renderTestEnCurso() {
  const q = testState.preguntas[testState.idx];
  if (!q) return "";
  const opciones = q.opciones || q.ops || {};
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;color:var(--greyM)">Pregunta ${testState.idx+1}/${testState.preguntas.length}</span>

      <div id="testExp" style="display:none;margin-top:8px;padding:10px;background:rgba(0,0,0,.2);border-radius:6px;font-size:12px;line-height:1.6;color:var(--grey)"></div>
      <button class="btn btn-primary" id="btnSiguiente" style="display:none;margin-top:10px">Siguiente →</button>
    </div>
  `;
}

function bindTestEnCurso() {
  const q = testState.preguntas[testState.idx];
  document.querySelectorAll("#testOpciones [data-op]").forEach(btn => {
    btn.onclick = () => {
      if (testState.respuesta !== null) return;
      testState.respuesta = btn.dataset.op;
      const correcta = q.correcta || q.ok;
      document.querySelectorAll("#testOpciones [data-op]").forEach(b => {
        if (b.dataset.op === correcta) b.classList.add("correct");
        else if (b.dataset.op === testState.respuesta) b.classList.add("wrong");
      });
      if (testState.respuesta === correcta) testState.correctas++;
      else {
        testState.fallos++;
        const errores = {...(STATE.erroresFrecuentes||{})};
        const key = `T${q.tema || testTemasSeleccionados[0]}`;
        errores[key] = (errores[key]||0)+1;
        saveState({ erroresFrecuentes: errores });
      }
      document.getElementById("testExp").style.display = "block";
      document.getElementById("testExp").textContent = "💡 " + (q.explicacion || q.exp || "");
      document.getElementById("btnSiguiente").style.display = "block";
    };
  });
  const sig = document.getElementById("btnSiguiente");
  if (sig) sig.onclick = () => {
    if (testState.idx+1 >= testState.preguntas.length) {
      clearInterval(testState.timer);
      const nota = ((testState.correctas-(testState.fallos*0.5))/testState.preguntas.length*10).toFixed(1);
      const h = [...(STATE.testHist||[]), { fecha:new Date().toISOString(), tema:testTemasSeleccionados.join(","), correctas:testState.correctas, fallos:testState.fallos, total:testState.preguntas.length, nota, tiempo:testState.tiempo }];
      saveState({ testHist: h });
      testState.fase = "result";
      renderTest_();
    } else {
      testState.idx++; testState.respuesta = null;
      renderTest_();
      testState.timer = setInterval(() => { testState.tiempo++; const el=document.getElementById("testTiempo"); if(el) el.textContent=fmtSecs(testState.tiempo); }, 1000);
    }
  };
}

function renderTestResultado() {
  const nota = ((testState.correctas-(testState.fallos*0.5))/testState.preguntas.length*10).toFixed(1);
  return `
    <div class="card accent">

function bindTestResultado() {

function getTemasFiltrados() {
  switch (repasoFiltro) {

    case "sin": return TEMAS.filter(t => !STATE.repaso[t.n]?.estudiado);
    case "juridico": return TEMAS.filter(t => t.b==="J");

    case "tecnico": return TEMAS.filter(t => t.b==="T");

function cicloEstadoTema(n) {
  const r = STATE.repaso[n] || {};
  const next = nextRepaso(r.confianza, r.ultimoRepaso);
  const vence = next && new Date(next) <= new Date();
  const hoy = new Date().toISOString().split("T")[0];
  let estadoActual = "gris";
  if (r.estudiado) estadoActual = vence ? "rojo" : (r.confianza >= 4 ? "verde" : "dorado");
  const orden = ["gris", "rojo", "dorado", "verde"];
  const siguiente = orden[(orden.indexOf(estadoActual) + 1) % orden.length];
  const actual = STATE.repaso[n] || {};
  let nuevoEstado;
  if (siguiente === "gris") {
    nuevoEstado = { ...actual, estudiado: false, confianza: 0, ultimoRepaso: null };
  } else if (siguiente === "rojo") {
    const haceMucho = new Date(); haceMucho.setDate(haceMucho.getDate() - 40);
    nuevoEstado = { ...actual, estudiado: true, confianza: 1, ultimoRepaso: haceMucho.toISOString().split("T")[0], vueltas: (actual.vueltas||0)+1 };
  } else if (siguiente === "dorado") {
    nuevoEstado = { ...actual, estudiado: true, confianza: 3, ultimoRepaso: hoy, vueltas: (actual.vueltas||0)+1 };
  } else {
    nuevoEstado = { ...actual, estudiado: true, confianza: 5, ultimoRepaso: hoy, vueltas: (actual.vueltas||0)+1 };
  }
  saveState({ repaso: { ...STATE.repaso, [n]: nuevoEstado } });
  const etiquetas = { gris: "⬜ Sin estudiar", rojo: "🔴 Vence", dorado: "🟡 Al día", verde: "🟢 Dominado" };
  toast(`T${n} → ${etiquetas[siguiente]}`);
}

// ── SM-2 Spaced Repetition ──────────────────────────────────
function sm2Next(card, calidad) {
  // calidad: 0=fallo total, 1=fallo pero recordé algo, 2=dudé, 3=sabía, 4=fácil, 5=trivial
  let { n = 0, ef = 2.5, interval = 1 } = card.sm2 || {};
  if (calidad < 3) { n = 0; interval = 1; }
  else {
    if (n === 0) interval = 1;
    else if (n === 1) interval = 6;
    else interval = Math.round(interval * ef);
    n++;
  }
  ef = Math.max(1.3, ef + 0.1 - (5 - calidad) * (0.08 + (5 - calidad) * 0.02));
  const nextDate = new Date(); nextDate.setDate(nextDate.getDate() + interval);
  return { n, ef, interval, nextDate: nextDate.toISOString() };
}

function getFlashCardsSM2() {
  const apuntes = STATE.apuntes || [];
  const mnemos = STATE.mnemos || [];
  const opotips = MNEMOS_OPOTIPS;
  const hoy = new Date().toISOString().split("T")[0];
  const sm2Data = STATE.sm2Data || {};

  const tarjetas = [
    ...opotips.map(m => ({ id: `opo_${m.id}`, front: `${m.regla}\n(${m.titulo})`, back: m.contenido + (m.temas.length ? `\n\nTemas: ${m.temas.map(t => "T"+t).join(", ")}` : ""), tipo: "opotip" })),
    ...mnemos.map((m,i) => ({ id: `mnemo_${i}`, front: `${m.ley} art.${m.art || ""}`, back: (m.txt||"").substring(0,300), tipo: "mnemo" })),
    ...apuntes.filter(a => a.tipo === "acronimo").map(a => {
      try { const d = JSON.parse(a.contenido); return { id: `acro_${a.id}`, front: `Acrónimo: ${d.acronimo}`, back: (d.items||[]).map(it => `${it.letra} → ${it.clave}${it.extra ? " ("+it.extra+")" : ""}`).join("\n"), tipo: "acronimo" }; } catch { return null; }
    }).filter(Boolean),
  ];

  return tarjetas.map(t => {
    const s = sm2Data[t.id] || {};
    const pendiente = !s.nextDate || s.nextDate.split("T")[0] <= hoy;
    return { ...t, sm2: s, pendiente };
  }).sort((a, b) => {
    if (a.pendiente && !b.pendiente) return -1;
    if (!a.pendiente && b.pendiente) return 1;
    return (a.sm2.nextDate || "") < (b.sm2.nextDate || "") ? -1 : 1;
  });
}

function baremoDominadas(v) {
  const table = [[17,10],[15,9],[13,8],[11,7],[10,6],[9,5],[7,4],[5,3],[3,2],[1,1]];
  const f = table.find(([x])=>v>=x); return f ? f[1] : 0;
}

  const table = [[180,10],[186,9],[192,8],[198,7],[204,6],[210,5],[216,4],[222,3],[228,2],[234,1]];

}

// PANEL: PLAN (DIETA AUTOMÁTICA + ENTRENO PROGRESIVO + IA OPCIONAL)
// ═══════════════════════════════════════════════════════════
let planTipo = "dieta";
let dietaSeleccion = { proteina: [], hidrato: [], grasa: [], verdura: [], fruta: [] };

function calcularTDEE(perfil, tipoDia) {
  const peso = parseFloat(perfil.peso);
  const altura = parseFloat(perfil.altura);
  const edad = parseFloat(perfil.edad);
  const sexo = perfil.sexo || "hombre";
  // Mifflin-St Jeor: hombre = +5, mujer = -161
  const tmb = 10 * peso + 6.25 * altura - 5 * edad + (sexo === "mujer" ? -161 : 5);
  const factores = {
    descanso: 1.3, dominadas: 1.6, carrera: 1.7, fuerza: 1.6, circuito: 1.75, simulacro: 1.8, doble: 1.9,
  };
  const factor = factores[tipoDia] || 1.5;
  const tdee = Math.round(tmb * factor);
  return { tmb: Math.round(tmb), tdee, factor };
}

function macrosObjetivo(tdee, objetivo, peso) {
  let kcalAjustadas = tdee;
  if (objetivo === "definir") kcalAjustadas = Math.round(tdee * 0.85);
  if (objetivo === "volumen") kcalAjustadas = Math.round(tdee * 1.1);
  if (objetivo === "rendimiento") kcalAjustadas = Math.round(tdee * 1.05);
  // Rendimiento: algo menos de proteína y grasa que el resto para liberar más hueco a hidratos (energía para entrenar/examen)
  const proteinaG = Math.round(peso * (objetivo === "rendimiento" ? 1.8 : 2));
  const grasaPct = objetivo === "rendimiento" ? 0.22 : 0.25;
  const grasaG = Math.round((kcalAjustadas * grasaPct) / 9);
  const kcalProteina = proteinaG * 4;
  const kcalGrasa = grasaG * 9;
  const hidratoG = Math.max(0, Math.round((kcalAjustadas - kcalProteina - kcalGrasa) / 4));
  return { kcal: kcalAjustadas, proteinaG, grasaG, hidratoG };
}

// Alimentos aptos para comidas tipo desayuno/merienda (nada de pescado, carne roja, legumbres...)
const PROTEINAS_DESAYUNO = ["Huevo entero","Clara de huevo","Jamón cocido","Pechuga de pavo (fiambre)","Queso fresco batido 0%","Yogur griego natural","Yogur griego 0%","Requesón","Queso cottage","Proteína whey (polvo)","Leche entera","Leche semidesnatada","Leche desnatada","Bebida de soja","Queso mozzarella","Yogur natural entero","Kéfir","Tofu"];
const HIDRATOS_DESAYUNO = ["Pan blanco","Pan integral","Avena (copos)","Pan de molde integral","Tortitas de arroz","Tortitas de maíz","Cereales integrales","Tortillas de trigo (wraps)"];
const GRASAS_DESAYUNO = ["Mantequilla de cacahuete","Aguacate","Almendras","Nueces","Avellanas","Anacardos","Pistachos","Cacahuetes","Semillas de chía","Semillas de lino","Semillas de girasol","Semillas de calabaza","Queso curado","Queso de cabra","Mantequilla"];
const COMIDAS_TIPO_DESAYUNO = ["Desayuno", "Media mañana", "Merienda", "Recena"];

function generarDietaAutomatica(macros, comidasNum) {
  // Reparte los gramos objetivo entre alimentos del banco, repartidos en N comidas
  const porComida = Math.max(1, parseInt(comidasNum) || 4);
  // Solo proteínas "densas" (>=15g proteína/100g) como fuente principal, para evitar raciones absurdas tipo "1kg de leche"
  const proteinas = ALIMENTOS.filter(a => a.g === "proteina" && a.p >= 15).sort(() => Math.random() - 0.5);
  const hidratos = ALIMENTOS.filter(a => a.g === "hidrato" && a.h >= 15).sort(() => Math.random() - 0.5);
  const grasas = ALIMENTOS.filter(a => a.g === "grasa").sort(() => Math.random() - 0.5);
  const verduras = ALIMENTOS.filter(a => a.g === "verdura").sort(() => Math.random() - 0.5);
  const frutas = ALIMENTOS.filter(a => a.g === "fruta").sort(() => Math.random() - 0.5);

  // Subconjuntos aptos para comidas tipo desayuno (sin pescado/carne/legumbres)
  const proteinasDesayuno = ALIMENTOS.filter(a => PROTEINAS_DESAYUNO.includes(a.n)).sort(() => Math.random() - 0.5);
  const hidratosDesayuno = ALIMENTOS.filter(a => HIDRATOS_DESAYUNO.includes(a.n)).sort(() => Math.random() - 0.5);
  const grasasDesayuno = ALIMENTOS.filter(a => GRASAS_DESAYUNO.includes(a.n)).sort(() => Math.random() - 0.5);

  // Solo límite MÁXIMO por ración (evita raciones absurdas); sin mínimo forzado que infle el total
  const MAX_GRAMOS = { proteina: 250, hidrato: 160, grasa: 35 };

  const comidas = [];
  const nombresComida = ["Desayuno", "Media mañana", "Comida", "Merienda", "Cena", "Recena"];
  // Reparto proporcional simple: cada comida recibe 1/N del objetivo total (reparto plano, sin acumulación de mínimos)
  const pPorComida = macros.proteinaG / porComida;
  const hPorComida = macros.hidratoG / porComida;
  const gPorComida = macros.grasaG / porComida;

  let idxDesayuno = 0, idxNormal = 0;
  for (let i = 0; i < porComida; i++) {
    const nombreComida = nombresComida[i] || `Comida ${i + 1}`;
    const esDesayuno = COMIDAS_TIPO_DESAYUNO.includes(nombreComida);
    const poolP = (esDesayuno && proteinasDesayuno.length) ? proteinasDesayuno : proteinas;
    const poolH = (esDesayuno && hidratosDesayuno.length) ? hidratosDesayuno : hidratos;
    const poolG = (esDesayuno && grasasDesayuno.length) ? grasasDesayuno : grasas;
    const idx = esDesayuno ? idxDesayuno++ : idxNormal++;

    const alimentoP = poolP[idx % poolP.length];
    const alimentoH = poolH[idx % poolH.length];
    const alimentoG = poolG[idx % poolG.length];
    const alimentoVF = esDesayuno
      ? (frutas[idx % frutas.length] || verduras[idx % verduras.length])
      : (verduras[idx % verduras.length]);

    let gramosP = alimentoP.p > 0 ? Math.round((pPorComida / alimentoP.p) * 100) : 0;
    let gramosH = alimentoH.h > 0 ? Math.round((hPorComida / alimentoH.h) * 100) : 0;
    let gramosG = alimentoG.f > 0 ? Math.round((gPorComida / alimentoG.f) * 100 * 0.4) : 0; // 40% de la grasa va aquí, resto viene de la proteína/cocción

    // Solo recorte de máximo (sin inflar con mínimos)
    gramosP = Math.min(MAX_GRAMOS.proteina, Math.max(15, gramosP));
    gramosH = Math.min(MAX_GRAMOS.hidrato, Math.max(10, gramosH));
    gramosG = Math.min(MAX_GRAMOS.grasa, Math.max(0, gramosG));

    comidas.push({
      nombre: nombreComida,
      items: [
        { alimento: alimentoP.n, gramos: gramosP },
        { alimento: alimentoH.n, gramos: gramosH },
        { alimento: alimentoVF.n, gramos: esDesayuno ? Math.min(150, Math.max(80, alimentoVF.h ? Math.round(20/alimentoVF.h*100) : 100)) : 100 },
        ...(gramosG > 3 ? [{ alimento: alimentoG.n, gramos: gramosG }] : []),
      ],
    });
  }

  // Ajuste de escala final: la suma real de kcal (incluyendo grasas/proteínas "extra" que traen
  // los propios alimentos elegidos) casi siempre se desvía del objetivo. Se reescala proporcionalmente
  // todo el día para que el total quede dentro de un ±5% del objetivo, sin tocar la verdura (fija a 100g).
  let kcalTotalReal = 0;
  comidas.forEach(c => { kcalTotalReal += calcularMacrosComida(c.items).kcal; });
  if (kcalTotalReal > 0) {
    const factorAjuste = macros.kcal / kcalTotalReal;
    if (factorAjuste < 0.9 || factorAjuste > 1.1) {
      comidas.forEach(c => {
        c.items.forEach(item => {
          // No reescalar la verdura/fruta de referencia (se queda fija en su ración)
          const esVerduraOFruta = verduras.some(v => v.n === item.alimento) || frutas.some(f => f.n === item.alimento);
          if (!esVerduraOFruta) item.gramos = Math.max(10, Math.round(item.gramos * factorAjuste));
        });
      });
    }
  }

  return comidas;
}

function calcularMacrosComida(items) {
  let kcal = 0, p = 0, h = 0, f = 0;
  items.forEach(item => {
    const al = ALIMENTOS.find(a => a.n === item.alimento);
    if (!al) return;
    const factor = item.gramos / 100;
    kcal += al.kcal * factor; p += al.p * factor; h += al.h * factor; f += al.f * factor;
  });
  return { kcal: Math.round(kcal), p: Math.round(p), h: Math.round(h), f: Math.round(f) };
}

function fasePorFecha(fecha) {
  const inicio = FECHA_INICIO_ENTRENO.getTime();
  const fin = FECHA_FIN_ENTRENO.getTime();
  const total = fin - inicio;
  const transcurrido = fecha.getTime() - inicio;
  const pct = Math.max(0, Math.min(1, transcurrido / total));
  if (pct < 0.27) return { n: 1, nombre: "Acumulación de volumen", intensidad: "70-75%" };
  if (pct < 0.55) return { n: 2, nombre: "Fuerza máxima", intensidad: "80-85%" };
  if (pct < 0.85) return { n: 3, nombre: "Potencia y técnica de examen", intensidad: "85-90%" };
  return { n: 4, nombre: "Tappering (afinado pre-prueba)", intensidad: "50-60%, volumen reducido" };
}

// Semana global de entrenamiento (1 = primera semana desde FECHA_INICIO_ENTRENO)
function semanaGlobalEntreno(fecha) {
  const dias = Math.floor((fecha.getTime() - FECHA_INICIO_ENTRENO.getTime()) / 86400000);
  return Math.max(1, Math.floor(dias / 7) + 1);
}

// Ritmo objetivo de 1000m en segundos (sub-3:00 = 180s). Si hay marca real, parte de ahí; si no, estima desde un punto de partida razonable.
function ritmoObjetivoCarrera(minKmActual) {
  const objetivo = 180; // 3:00
  const partida = minKmActual || 240; // si no hay marca, asume 4:00 de partida
  return { objetivo, partida };
}

function generarEntrenoDia(tipoSesion, fase, maxDom, semanaGlobal, minKmActual) {
  const protocoloDorsal = [
    "Excéntrico banda unilateral (lado derecho) 3×12, bajada 4s",
    "Dead hang unilateral derecho 3×20s",
    "Isometría ángulo medio 3×20s",
    "Wrist curl + reverse wrist curl 3×15",
  ];
  const accesoriosPorFase = {
    1: ["Remo con mancuerna a una mano 3×12", "Face pull 3×15", "Curl bíceps 3×12", "Encogimientos de trapecio 3×15"],
    2: ["Remo en barra (Pendlay) 4×8", "Curl martillo 3×10", "Extensión tríceps polea 3×12", "Y-raise 3×12"],
    3: ["Remo en polea baja 3×10 (explosivo)", "Face pull explosivo 3×15", "Rack pull 3×6", "Farmer walk 3×30m"],
    4: ["Remo suave 2×12", "Movilidad de hombro 5min", "Wrist curl suave 2×15", "Estiramientos dorsales 5min"],
  };
  const baseDom = maxDom || 8;
  const semana = semanaGlobal || 1;
  // Semana relativa dentro del bloque (1, 2, 3... cíclica para variar el estímulo cada semana)
  const semanaEnBloque = ((semana - 1) % 4) + 1;

  if (tipoSesion === "dominadas") {
    // Progresión real: cada semana del bloque tiene un estímulo distinto, no la misma frase repetida
    const variantesPorFase = {
      1: [ // Bloque 1: volumen, construir base
        `Series largas: 5×(${Math.round(baseDom * 0.6)} reps prono), descanso 2min`,
        `Piramidal: 1-2-3-4-3-2-1 reps (parar si falla la técnica), descanso 90s`,
        `Negativas controladas: 5×3 (bajada 5s), descanso 90s + 3×(${Math.round(baseDom * 0.5)} reps normales)`,
        `Volumen total: acumula ${Math.round(baseDom * 3.5)} reps en el menor número de series posible, descanso libre`,
      ],
      2: [ // Bloque 2: fuerza máxima
        `Cluster sets: 6×3 reps con 15s descanso interno, descanso 2min entre clusters`,
        `Dominadas lastradas: 5×(${Math.max(3, Math.round(baseDom * 0.4))} reps) con lastre ligero, descanso 2min`,
        `EMOM 10min: ${Math.max(2, Math.round(baseDom * 0.35))} reps al inicio de cada minuto`,
        `Test parcial: máximas reps en serie única + 3×(${Math.round(baseDom * 0.6)} reps) tras 3min descanso`,
      ],
      3: [ // Bloque 3: potencia y técnica de examen
        `Test semanal a fallo técnico (anota el resultado en Físico)`,
        `Series a ritmo de examen: 4×(${Math.round(baseDom * 0.8)} reps) descanso 90s, cronometra el tiempo total`,
        `Repeticiones rápidas: 8×2 reps explosivas, descanso 45s (trabajo de potencia)`,
        `Simulacro: dominadas + circuito + sprint corto, todo seguido (condición real de examen)`,
      ],
      4: [ // Bloque 4: tappering
        `2×(${Math.round(baseDom * 0.5)} reps) suaves, técnica perfecta, sin fallo muscular`,
        `1×(${Math.round(baseDom * 0.6)} reps) + movilidad, intensidad muy baja`,
        `Activación ligera: 3×3 reps fáciles, foco en sensaciones, no en esfuerzo`,
        `Descanso de dominadas o solo protocolo dorsal, sin carga (últimos días pre-examen)`,
      ],
    };
    const series = variantesPorFase[fase.n][semanaEnBloque - 1];
    return { titulo: "💪 DOMINADAS", principal: `Semana ${semana} (semana ${semanaEnBloque} del bloque): ${series}`, accesorios: accesoriosPorFase[fase.n], dorsal: protocoloDorsal };
  }

  if (tipoSesion === "carrera") {
    const { objetivo, partida } = ritmoObjetivoCarrera(minKmActual);
    // Ritmo objetivo de la semana: interpola linealmente desde la marca de partida hasta el objetivo (180s) según semana global (asume ~19 semanas totales)
    const totalSemanas = 19;
    const progreso = Math.min(1, semana / totalSemanas);
    const ritmoSemana = Math.round(partida - (partida - objetivo) * progreso);
    const ritmo400 = Math.round(ritmoSemana * 0.4); // ritmo de 400m equivalente al ritmo objetivo de 1000m
    const ritmo300 = Math.round(ritmoSemana * 0.3);
    const ritmo200 = Math.round(ritmoSemana * 0.2);

    const variantesPorFase = {
      1: [ // Base aeróbica: no solo rodaje, también cuestas y fartlek suave
        `Rodaje continuo 30min, Z2 (conversacional, sin reloj)`,
        `Cuestas suaves: 8×40m subida a ritmo medio, bajada trote, recuperación completa`,
        `Fartlek ligero: 20min alternando 2min suave / 1min algo más rápido`,
        `Rodaje progresivo: 25min empezando suave y acabando casi a ritmo objetivo`,
      ],
      2: [ // Capacidad anaeróbica: series largas controladas
        `Series largas: 4×600m a ritmo ${fmtSecs(Math.round(ritmoSemana * 0.6))}/600m, descanso 3min trote suave`,
        `Series 800m: 3×800m a ritmo ${fmtSecs(Math.round(ritmoSemana * 0.8))}/800m, descanso 3min`,
        `Pirámide: 400-600-800-600-400m a ritmo objetivo, descanso 2-3min entre series`,
        `Series largas: 4×600m progresivas (cada una algo más rápida), descanso 3min`,
      ],
      3: [ // Específico de examen: series cortas a ritmo objetivo o más rápido
        `Series cortas: 8×300m a ritmo ${fmtSecs(ritmo300)}/300m, descanso 2min`,
        `Series cortas: 10×200m a ritmo ${fmtSecs(ritmo200)}/200m, descanso 90s`,
        `Series 400m: 6×400m a ritmo ${fmtSecs(ritmo400)}/400m (ritmo de examen), descanso 2min`,
        `TEST 1000m CRONOMETRADO — registra el resultado en Físico para ajustar progresión`,
      ],
      4: [ // Tappering: mantener velocidad, bajar volumen
        `Rodaje suave 15min + 4×100m a ritmo suave (activación, no esfuerzo)`,
        `3×300m a ritmo objetivo (mantener sensación de velocidad, sin fatiga)`,
        `Rodaje muy suave 10-12min, solo para soltar piernas`,
        `Descanso total o paseo suave (últimos días antes del examen)`,
      ],
    };
    const series = variantesPorFase[fase.n][semanaEnBloque - 1];
    const notaRitmo = fase.n >= 2 ? `\nRitmo objetivo de esta semana: ${fmtSecs(ritmoSemana)}/km (vas de ${fmtSecs(partida)} hacia ${fmtSecs(objetivo)})` : "";
    return { titulo: "🏃 CARRERA 1000M", principal: `Semana ${semana} (semana ${semanaEnBloque} del bloque): ${series}${notaRitmo}`, accesorios: ["Movilidad de cadera 5min", "Estiramiento isquiotibiales", "Técnica de carrera: skipping 2×20m"], dorsal: [] };
  }

  if (tipoSesion === "fuerza") {
    const series = fase.n === 1 ? "Sentadilla 3×8, Press banca 3×8, Remo 3×8"
      : fase.n === 2 ? "Sentadilla 4×6, Press banca 4×6, Peso muerto 3×6"
      : fase.n === 3 ? "Mantenimiento de cargas, foco técnica, peso muerto 3×5"
      : "Movilidad general, sin cargas pesadas";
    return { titulo: "⚙️ FUERZA GENERAL", principal: series, accesorios: ["Hip thrust 3×10", "Plancha 3×40s"], dorsal: protocoloDorsal };
  }
  if (tipoSesion === "circuito") {
    return { titulo: "🏁 CIRCUITO AGILIDAD", principal: "Simulación completa del circuito oficial ×3-5 repeticiones, descanso completo entre series", accesorios: ["Escalera de agilidad 10min", "Sprints cortos 6×20m"], dorsal: [] };
  }
  return { titulo: "😴 DESCANSO", principal: "Descanso activo: paseo suave, estiramientos, sin carga", accesorios: [], dorsal: [] };
}

let alimentosVisibles = 50;
function renderAlimentosLista() {
  const q = (document.getElementById("alimentosBusqueda")?.value || "").toLowerCase();
  const filtro = document.getElementById("alimentosFiltro")?.value || "todos";
  const filtrados = ALIMENTOS.filter(a => (filtro === "todos" || a.g === filtro) && (!q || a.n.toLowerCase().includes(q)));
  const labels = { proteina: "🍗", hidrato: "🍚", grasa: "🥑", verdura: "🥦", fruta: "🍎", extra: "🧂" };
  const fav = STATE.alimentosFav || [];
  const slice = q ? filtrados : filtrados.slice(0, alimentosVisibles);
  const container = document.getElementById("alimentosLista");
  container.innerHTML = slice.map(a => `
    <div class="checkrow ${fav.includes(a.n) ? "sel" : ""}" data-alimento="${esc(a.n)}" style="justify-content:space-between">
      <div style="display:flex;align-items:center;gap:8px">
        <div class="checkbox ${fav.includes(a.n) ? "on" : ""}">${fav.includes(a.n) ? "✓" : ""}</div>
        <span style="font-size:12px">${labels[a.g]} ${esc(a.n)}</span>
      </div>
      <span style="color:var(--greyM);font-size:11px">${a.kcal}kcal · P${a.p} H${a.h} G${a.f}</span>
    </div>`).join("")
    + (!q && filtrados.length > alimentosVisibles ? `<div style="text-align:center;padding:8px"><button class="btn btn-ghost sm" id="btnMasAlimentos">Ver ${Math.min(50, filtrados.length - alimentosVisibles)} más (${filtrados.length - alimentosVisibles} restantes)</button></div>` : "");
  container.querySelectorAll("[data-alimento]").forEach(row => {
    row.onclick = () => {
      const nombre = row.dataset.alimento;
      const favActual = STATE.alimentosFav || [];
      const nuevos = favActual.includes(nombre) ? favActual.filter(n => n !== nombre) : [...favActual, nombre];
      saveState({ alimentosFav: nuevos });
      renderAlimentosLista();
      renderAlimentosFavResumen();
    };
  });
  const btnMas = document.getElementById("btnMasAlimentos");
  if (btnMas) btnMas.onclick = () => { alimentosVisibles += 50; renderAlimentosLista(); };
}

function renderAlimentosFavResumen() {
  const el = document.getElementById("alimentosFavResumen");
  if (!el) return;
  const fav = STATE.alimentosFav || [];
  if (!fav.length) { el.innerHTML = `<div style="font-size:11px;color:var(--greyM)">Toca alimentos de la lista para marcarlos como favoritos. Se usarán primero al generar tu menú y puedes ver aquí el total de tu comida personalizada.</div>`; return; }
  const items = fav.map(n => ALIMENTOS.find(a => a.n === n)).filter(Boolean);
  const tot = items.reduce((s, a) => ({ kcal: s.kcal + a.kcal, p: s.p + a.p, h: s.h + a.h, f: s.f + a.f }), { kcal: 0, p: 0, h: 0, f: 0 });
  el.innerHTML = `
    <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:6px">${items.length} seleccionado(s) · ~${Math.round(tot.kcal)}kcal (P${Math.round(tot.p)} H${Math.round(tot.h)} G${Math.round(tot.f)}, por 100g de cada uno)</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px">
      ${items.map(a => `<span class="chip" style="background:rgba(201,162,39,.15);border-color:var(--gold);color:var(--gold)">${esc(a.n)}</span>`).join("")}
    </div>
    <button class="btn btn-ghost sm" id="btnLimpiarFavAlimentos">🗑 Quitar selección</button>`;
  const btnLimpiar = document.getElementById("btnLimpiarFavAlimentos");
  if (btnLimpiar) btnLimpiar.onclick = () => { saveState({ alimentosFav: [] }); renderAlimentosLista(); renderAlimentosFavResumen(); };
}

function actualizarConfirmDatosIA() {

function bindPlan() {
  document.getElementById("btnTipoDieta").onclick = () => { planTipo = "dieta"; renderPlan_(); };
  document.getElementById("btnTipoEntreno").onclick = () => { planTipo = "entreno"; renderPlan_(); };

  if (planTipo === "dieta") {
    document.getElementById("alimentosBusqueda").oninput = renderAlimentosLista;
    document.getElementById("alimentosFiltro").onchange = renderAlimentosLista;
    renderAlimentosLista();
    renderAlimentosFavResumen();

    actualizarConfirmDatosIA();
    ["dPeso","dAltura","dEdad","dSexo","dObjetivo"].forEach(id => {
      const el = document.getElementById(id);
      if (el) { el.addEventListener("input", actualizarConfirmDatosIA); el.addEventListener("change", actualizarConfirmDatosIA); }
    });

    // Pre-rellenar si el usuario guardó su perfil explícitamente
    const perfilGuardado = STATE.perfilFisico || {};
    if (perfilGuardado._guardadoPorUsuario) {
      if (perfilGuardado.peso) document.getElementById("dPeso").value = perfilGuardado.peso;
      if (perfilGuardado.altura) document.getElementById("dAltura").value = perfilGuardado.altura;
      if (perfilGuardado.edad) document.getElementById("dEdad").value = perfilGuardado.edad;
      if (perfilGuardado.sexo) document.getElementById("dSexo").value = perfilGuardado.sexo;
      if (perfilGuardado.objetivo) document.getElementById("dObjetivo").value = perfilGuardado.objetivo;
      actualizarConfirmDatosIA();
    }

    document.getElementById("btnGuardarPerfil").onclick = () => {      const datos = {

        altura: document.getElementById("dAltura").value,
        edad: document.getElementById("dEdad").value,
        sexo: document.getElementById("dSexo").value,

      const registros = [...(STATE.pesoCorporal || []), { peso: parseFloat(peso), fecha: new Date().toISOString() }];
      saveState({ pesoCorporal: registros });
      toast(`✅ ${peso}kg registrado`);
      renderPlan_();
    };

    const btnBatch = document.getElementById("btnBatchCooking");
    if (btnBatch) btnBatch.onclick = async () => {

// ═══════════════════════════════════════════════════════════
let zeppMapeoTemporal = null; // { headers, filas, mapeo: {fecha, sueno, pasos, fc} }

// Detecta automáticamente qué columna del CSV corresponde a cada dato, buscando por nombres habituales
function detectarColumnasZepp(headers) {
  const norm = (s) => s.toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // quita acentos correctamente (día -> dia)
    .replace(/[^a-z0-9]/g, "");
  const headersNorm = headers.map(norm);
  const buscar = (candidatos) => {
    for (const cand of candidatos) {
      const idx = headersNorm.findIndex(h => h.includes(cand));
      if (idx !== -1) return idx;
    }
    return -1;
  };
  return {
    fecha: buscar(["fecha", "dia", "date", "day"]),
    sueno: buscar(["sueno", "dormido", "sleep", "sleeptime", "totalsleep", "deepsleep"]),
    pasos: buscar(["pasos", "steps"]),
    fc: buscar(["frecuenciacardiaca", "fcreposo", "heartrate", "restingheartrate", "heartratevalue", "fc", "hr"]),
    calorias: buscar(["calorias", "kcal", "calorie"]),
  };
}

function parsearCSV(texto) {
  const lineas = texto.split(/\r?\n/).filter(l => l.trim());
  if (!lineas.length) return { headers: [], filas: [] };
  const headers = lineas[0].split(",").map(h => h.trim().replace(/^"|"$/g, ""));
  const filas = lineas.slice(1).map(linea => {
    // Maneja comas dentro de comillas de forma simple
    const valores = [];
    let actual = "", dentroComillas = false;
    for (const char of linea) {
      if (char === '"') dentroComillas = !dentroComillas;
      else if (char === "," && !dentroComillas) { valores.push(actual.trim()); actual = ""; }
      else actual += char;
    }
    valores.push(actual.trim());
    return valores;
  });
  return { headers, filas };
}

function parsearFechaFlexible(raw) {
  if (!raw) return null;
  const s = raw.trim();
  // Intento 1: formato ISO directo (YYYY-MM-DD) — el más fiable, probar primero
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d.toISOString().split("T")[0];
  }
  // Intento 2: DD/MM/YYYY o DD-MM-YYYY (formato español/europeo habitual en exportaciones de Zepp)
  const matchEuropeo = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if (matchEuropeo) {
    const [, dd, mm, yyyy] = matchEuropeo;
    const d = new Date(parseInt(yyyy), parseInt(mm) - 1, parseInt(dd));
    if (!isNaN(d.getTime())) return d.toISOString().split("T")[0];
  }
  // Último recurso: dejar que el navegador lo intente (formatos no contemplados arriba)
  const d = new Date(s);
  if (!isNaN(d.getTime())) return d.toISOString().split("T")[0];
  return null;
}

function bindZeppCard() {
  const input = document.getElementById("inputZeppCSV");
  if (input) input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const { headers, filas } = parsearCSV(ev.target.result);
      if (!headers.length || !filas.length) { toast("⚠️ No se pudo leer el archivo"); return; }
      const auto = detectarColumnasZepp(headers);
      zeppMapeoTemporal = { headers, filas, mapeo: auto };
      mostrarMapeoZepp();
    };
    reader.readAsText(file);
  };
  const btnVer = document.getElementById("btnVerDatosZepp");
  if (btnVer) btnVer.onclick = () => {
    const el = document.getElementById("zeppDatosVista");
    const datos = (STATE.datosZepp || []).slice(-14).reverse();
    el.innerHTML = datos.map(d => `
      <div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
        <span>${fmtDate(d.fecha)}</span>
        <span>${d.sueno ? `😴 ${d.sueno}h` : ""} ${d.pasos ? `· 👣 ${d.pasos}` : ""} ${d.fc ? `· ❤️ ${d.fc}` : ""}</span>
      </div>`).join("") || `<div style="font-size:12px;color:var(--greyM)">Sin datos</div>`;
  };
}

function mostrarMapeoZepp() {
  const { headers, mapeo } = zeppMapeoTemporal;
  const el = document.getElementById("zeppMapeoUI");
  const campos = [
    { key: "fecha", label: "Fecha", requerido: true },
    { key: "sueno", label: "Horas de sueño", requerido: false },
    { key: "pasos", label: "Pasos", requerido: false },
    { key: "fc", label: "Frecuencia cardíaca", requerido: false },
  ];
  el.innerHTML = `
    <div class="card" style="background:rgba(0,0,0,.2)">
      <div style="font-size:11px;color:var(--gold);font-weight:700;margin-bottom:8px">Revisa que las columnas detectadas sean correctas (o elígelas a mano):</div>
      ${campos.map(c => `
        <label>${c.label}${c.requerido ? " *" : ""}</label>
        <select id="zeppCol_${c.key}">
          <option value="-1">-- No disponible --</option>
          ${headers.map((h, i) => `<option value="${i}" ${mapeo[c.key] === i ? "selected" : ""}>${esc(h)}</option>`).join("")}
        </select>
      `).join("")}
      <button class="btn btn-primary sm" id="btnConfirmarImportZepp">✅ Importar con este mapeo</button>
      <button class="btn btn-ghost sm" id="btnCancelarImportZepp">Cancelar</button>
    </div>
  `;
  document.getElementById("btnCancelarImportZepp").onclick = () => { zeppMapeoTemporal = null; el.innerHTML = ""; };
  document.getElementById("btnConfirmarImportZepp").onclick = () => {
    const mapeoFinal = {};
    campos.forEach(c => { mapeoFinal[c.key] = parseInt(document.getElementById(`zeppCol_${c.key}`).value); });
    if (mapeoFinal.fecha === -1) { toast("⚠️ Selecciona la columna de fecha"); return; }
    const { filas } = zeppMapeoTemporal;
    // Detectar si la columna de sueño está en minutos (valores típicos >20) para convertir a horas
    let suenoEnMinutos = false;
    if (mapeoFinal.sueno !== -1 && filas.length) {
      const muestra = parseFloat(filas[0][mapeoFinal.sueno]);
      if (muestra && muestra > 20) suenoEnMinutos = true;
    }
    const nuevos = filas.map(fila => {
      const fechaRaw = fila[mapeoFinal.fecha];
      const fechaISO = parsearFechaFlexible(fechaRaw);
      if (!fechaISO) return null;
      let suenoVal = mapeoFinal.sueno !== -1 ? parseFloat(fila[mapeoFinal.sueno]) || null : null;
      if (suenoVal && suenoEnMinutos) suenoVal = Math.round((suenoVal / 60) * 10) / 10;
      return {
        fecha: fechaISO,
        sueno: suenoVal,
        pasos: mapeoFinal.pasos !== -1 ? parseInt(fila[mapeoFinal.pasos]) || null : null,
        fc: mapeoFinal.fc !== -1 ? parseInt(fila[mapeoFinal.fc]) || null : null,
      };
    }).filter(Boolean);
    // Combinar con datos existentes, evitando duplicados por fecha (el más nuevo sobreescribe)
    const existentes = STATE.datosZepp || [];
    const mapa = {};
    [...existentes, ...nuevos].forEach(d => { mapa[d.fecha] = d; });
    const combinados = Object.values(mapa).sort((a, b) => a.fecha.localeCompare(b.fecha));
    saveState({ datosZepp: combinados });
    toast(`✅ ${nuevos.length} días importados`);
    zeppMapeoTemporal = null;
    renderStats_();
  };
}

function bindStats() {
  bindZeppCard();
  bindGraficasEvolucion();
  const btnCambiarKey = document.getElementById("btnCambiarApiKey");
  if (btnCambiarKey) btnCambiarKey.onclick = async () => { await pedirApiKey(); renderStats_(); };
  const btnBorrarKey = document.getElementById("btnBorrarApiKey");
  if (btnBorrarKey) btnBorrarKey.onclick = () => {
    if (confirm("¿Borrar la clave de API guardada?")) { clearApiKey(); toast("🗑 Clave borrada"); renderStats_(); }
  };

  const btnAct = document.getElementById("btnActivarRec");
  if (btnAct) btnAct.onclick = async () => {
    if (typeof Notification === "undefined") { toast("⚠️ Tu navegador no soporta notificaciones"); return; }
    const perm = await Notification.requestPermission();
    if (perm === "granted") {
      const hora = document.getElementById("horaRecordatorio").value;
      saveState({ horaRecordatorio: hora, recordatorioActivo: true });
      toast("🔔 Recordatorio activado"); renderStats_();
    } else toast("⚠️ Permiso denegado");
  };
  const btnDes = document.getElementById("btnDesactivarRec");
  if (btnDes) btnDes.onclick = () => { saveState({ recordatorioActivo: false }); toast("🔕 Desactivado"); renderStats_(); };

  document.getElementById("btnExportBackup").onclick = () => {
    const blob = new Blob([JSON.stringify(STATE,null,2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href=url; a.download=`gps_dani_backup_${new Date().toISOString().split("T")[0]}.json`; a.click();
    saveState({ ultimoBackup: new Date().toISOString() });
    toast("📁 Backup exportado");
    renderStats_();
  };
  document.getElementById("inputImportBackup").onchange = (e) => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try { STATE = JSON.parse(ev.target.result); saveState({}); toast("✅ Datos importados"); renderContent(); }
      catch { toast("Error al importar"); }
    };
    reader.readAsText(file);
  };
  document.getElementById("btnResetTodo").onclick = () => {
    const mnemos=(STATE.mnemos||[]).length, tests=(STATE.testHist||[]).length, sesiones=(STATE.sesiones||[]).length;
    const resumen = `${mnemos} mnemotecnias\n${tests} tests\n${sesiones} sesiones físicas`;
    if (confirm(`⚠️ Vas a borrar PERMANENTEMENTE:\n\n${resumen}\n\n¿Seguro?`)) {
      if (confirm("Última confirmación: ¿de verdad quieres borrar todo?")) {
        localStorage.removeItem("gps_dani_html");
        STATE = loadState();
        toast("🗑 Datos borrados"); renderContent();
      }
    }
  };
}
function renderStats_() { document.getElementById("content").innerHTML = renderStats(); bindStats(); }

// El estado del proceso vive aquí, independiente del DOM de Apuntes
let _bgProcesando = false;
let _bgProgreso = { fase: "", completados: 0, total: 0, resultados: [] };

function bgSetFase(txt) {
  _bgProgreso.fase = txt;
  // Actualizar indicador global (siempre visible en el header)
  const ind = document.getElementById("bgIndicator");
  const indTxt = document.getElementById("bgIndicatorTxt");
  if (ind) ind.style.display = "flex";
  if (indTxt) indTxt.textContent = txt;
  // Actualizar el panel de apuntes solo si está visible
  const el = document.getElementById("progresoFase");
  if (el) el.textContent = txt;
}

function bgSetFoto(idx, txt) {
  _bgProgreso.completados++;
  const bar = Math.round(_bgProgreso.completados / _bgProgreso.total * 100);
  // Actualizar DOM solo si existe (puede no existir si cambiaron de pestaña)
  const el = document.getElementById("fotoStatus" + idx);
  if (el) el.innerHTML = txt;
  const barEl = document.getElementById("progresoBar");
  if (barEl) barEl.style.width = bar + "%";
}

function bgFinalizar(resultados) {
  _bgProcesando = false;
  // Ocultar indicador global
  const ind = document.getElementById("bgIndicator");
  if (ind) ind.style.display = "none";
  // Actualizar panel si está visible
  const card = document.getElementById("progresoCard");
  if (card) card.innerHTML = `
    <div class="card-title" style="color:var(--green)">✅ Listo — ${resultados.length} archivo(s) guardados</div>
    ${resultados.map(r => `<div style="font-size:12px;padding:3px 0;border-bottom:1px solid var(--border)">${r}</div>`).join("")}
    <div style="font-size:11px;color:var(--textL);margin-top:8px">Guardado en Apuntes → T correspondiente.</div>`;
  // Restaurar botón si está visible
  const btn = document.getElementById("btnProcesarApuntes");
  if (btn) { btn.disabled = false; btn.textContent = "⚡ Procesar fotos → distribuir a todo"; }
  toast("✅ " + resultados.length + " archivo(s) generados — guardados en Apuntes");
}

function renderApuntesDetalle() {

  if (v && v.tipo === "sesion") {
    const sesion = apuntes.filter(a => a.sesionId === v.sesionId);
    const nombre = sesion[0]?.sesionNombre || v.sesionId;
    return `
      <button class="btn btn-ghost sm" id="btnVolverApuntes" style="margin-bottom:10px">← Volver a T${v.temaId}</button>
      <div class="card accent">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
          <div class="card-title" style="margin:0;flex:1">📁 ${esc(nombre)} (${sesion.length} archivos)</div>
          <button class="btn btn-ghost sm" data-rename-ses="${v.sesionId}" data-ses-nombre="${esc(nombre)}" style="padding:4px 10px">✏️ Renombrar</button>
        </div>
        <div style="font-size:11px;color:var(--textL)">Todos generados en la misma sesión</div>
      </div>
      ${sesion.slice().reverse().map(a => renderApunteCard(a)).join("")}`;
  }

  if (v && v.tipo === "tema") {
    const temaId = v.temaId;
    const tema = TEMAS.find(t => t.n === temaId);
    const delTema = temaId === "sin"
      ? apuntes.filter(a => !a.temas?.length)
      : apuntes.filter(a => a.temas?.includes(temaId));
    const porSesion = {};
    const sueltos = [];
    delTema.forEach(a => {
      if (a.sesionId) { if (!porSesion[a.sesionId]) porSesion[a.sesionId]=[]; porSesion[a.sesionId].push(a); }
      else sueltos.push(a);
    });
    const sesiones = Object.entries(porSesion).sort((a,b) => b[0].localeCompare(a[0]));
    return `
      <button class="btn btn-ghost sm" id="btnVolverApuntes" style="margin-bottom:10px">← Volver</button>
      <div class="card accent">
        <div class="card-title">📁 ${tema?`T${tema.n} — ${esc(tema.nombre)}`:"Sin tema"} (${delTema.length})</div>

      ${sesiones.length?`<div class="divider"><span>📅 Sesiones de estudio</span><div class="div-line"></div></div>`:""}
      ${sesiones.map(([sid,items]) => {
        const nom = items[0]?.sesionNombre||sid;
        const tipos = [...new Set(items.map(a=>TIPOS_APUNTE[a.tipo]?.icon||"📄"))].join(" ");
        return `<div style="display:flex;flex-direction:column;gap:0" class="card" style="padding:0;margin-bottom:6px">
          <div class="tema-item" data-sesion-id="${esc(sid)}" data-tema-id="${temaId}" style="margin:0;border-radius:8px 8px 0 0;border-bottom:0">
            <span style="font-size:20px">📁</span>
            <div style="flex:1"><div style="font-size:13px;font-weight:700">${esc(nom)}</div>
            <div style="font-size:11px;color:var(--textL)">${tipos} · ${items.length} archivos</div></div>
            <button class="btn btn-ghost sm" data-rename-ses="${esc(sid)}" data-ses-nombre="${esc(nom)}" style="padding:4px 8px" onclick="event.stopPropagation()">✏️</button>
            <span class="chip" style="background:#eff6ff;border-color:var(--navyL);color:var(--navy)">${items.length}</span>
          </div>
        </div>`;
      }).join("")}
      ${sueltos.length?`<div class="divider"><span>Apuntes sueltos</span><div class="div-line"></div></div>
        ${sueltos.slice().reverse().map(a=>renderApunteCard(a)).join("")}`:""}
      ${sesiones.length===0&&sueltos.length===0?`<div class="card" style="text-align:center;color:var(--textL)">Vacío</div>`:""}`;
  }
  return "";
}


function renderApuntes() {
  if (apuntesVistaDetalle) return renderApuntesDetalle();
  const apuntes = STATE.apuntes || [];
  const temasConApuntes = TEMAS.filter(t => apuntes.some(a => a.temas.includes(t.n)));
  const sinTema = apuntes.filter(a => !a.temas || a.temas.length === 0);

  // Búsqueda y filtrado
  const filtrados = apuntes.filter(a => {
    const textoOk = !apuntesBusq || (a.titulo + " " + a.contenido).toLowerCase().includes(apuntesBusq.toLowerCase());
    const tipoOk = apuntesFiltroTipo === "todos" || a.tipo === apuntesFiltroTipo;
    const temaOk = apuntesFiltroTema === "todos"

      <p style="font-size:12px;color:var(--greyM);margin-bottom:10px">Sube tus apuntes en foto aquí. La app los digitaliza, transcribe, genera acrónimos, cómic y test automáticamente y lo guarda en todos los apartados.</p>
      <label>Tema</label>
      <select id="apuntesFotoTema">
        ${TEMAS.map(t => `<option value="${t.n}">T${t.n} — ${esc(t.nombre)}</option>`).join("")}
      </select>
      <label>¿Qué quieres generar? (puedes marcar varios)</label>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genAcronimo" ${genOpciones.acronimo?"checked":""}> 🔤 Acrónimos</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genComic" ${genOpciones.comic?"checked":""}> 🎨 Cómic</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genTest" ${genOpciones.test?"checked":""}> 📝 Test (5 preguntas)</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genResumen" ${genOpciones.resumen?"checked":""}> 📋 Resumen</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genTranscripcion" ${genOpciones.transcripcion?"checked":""}> 📄 Transcripción completa</label>
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px"><input type="checkbox" id="genMnemo" ${genOpciones.mnemo?"checked":""}> 🧠 Mnemotecnia Major</label>
      </div>
      <div class="btn-row" style="margin-bottom:8px">
        <button class="btn btn-secondary sm" id="btnApuntesFotoCamera" style="flex:1">📸 Cámara</button>
        <button class="btn btn-secondary sm" id="btnApuntesFotoGaleria" style="flex:1">🖼 Galería (varias)</button>
      </div>
      <input type="file" id="apuntesInputCamera" accept="image/*" capture="environment" style="display:none">
      <input type="file" id="apuntesInputGaleria" accept="image/*" multiple style="display:none">
      <div id="apuntesFotoThumbs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:6px;margin-bottom:8px"></div>
      <button class="btn btn-primary" id="btnProcesarApuntes" style="width:100%;display:none">⚡ Procesar fotos → distribuir a todo</button>
      <div id="apuntesProcesando"></div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="kpi-n">${apuntes.length}</div><div class="kpi-l">Total apuntes</div></div>
      <div class="kpi"><div class="kpi-n">${temasConApuntes.length}</div><div class="kpi-l">Temas con apuntes</div></div>
      <div class="kpi"><div class="kpi-n">${Object.keys(TIPOS_APUNTE).filter(t => apuntes.some(a => a.tipo === t)).length}</div><div class="kpi-l">Tipos distintos</div></div>
    </div>
    <div class="card accent">
      <div class="card-title">🔍 BUSCAR EN MIS APUNTES</div>
      <input type="text" id="apuntesBusqueda" placeholder="Buscar por título o contenido..." value="${esc(apuntesBusq)}">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px">
        <select id="apuntesFiltroTipo">
          <option value="todos" ${apuntesFiltroTipo==="todos"?"selected":""}>Todos los tipos</option>
          ${Object.entries(TIPOS_APUNTE).map(([k,v]) => `<option value="${k}" ${apuntesFiltroTipo===k?"selected":""}>${v.icon} ${v.label}</option>`).join("")}
        </select>
        <select id="apuntesFiltroTema">
          <option value="todos" ${apuntesFiltroTema==="todos"?"selected":""}>Todos los temas</option>
          <option value="sin" ${apuntesFiltroTema==="sin"?"selected":""}>Sin tema</option>
          ${temasConApuntes.map(t => `<option value="${t.n}" ${apuntesFiltroTema===String(t.n)?"selected":""}>T${t.n} — ${esc(t.nombre)}</option>`).join("")}

    ${mostrandoBusqueda ? `

      ${filtrados.map(a => renderApunteCard(a)).join("")}
    ` : `
      <div class="card" style="border:0;background:transparent;padding:4px 0">
        <div style="font-size:12px;color:var(--greyM)">
        Todo lo que genera la IA aparece aquí organizado por tema.</div>
      </div>
    `}
  `;
}


async function procesarApuntesFotos() {
  const fotos = [...apuntesFotos];
  if (!fotos.length) return;
  const temaSel = parseInt(document.getElementById("apuntesFotoTema")?.value || "1");
  const tema = TEMAS.find(t => t.n === temaSel) || TEMAS[0];
  const genAcronimo = genOpciones.acronimo;
  const genComic = genOpciones.comic;
  const genTest = genOpciones.test;
  const genResumen = genOpciones.resumen;
  const genMnemo = genOpciones.mnemo;
  const output = document.getElementById("apuntesProcesando");
  const btn = document.getElementById("btnProcesarApuntes");
  if (btn) { btn.disabled = true; btn.textContent = "⏳ Procesando..."; }

  const sesionId = "s" + Date.now();
  const hoy = new Date();
  const sesionNombre = `T${temaSel} \u00b7 ${hoy.getDate()}/${hoy.getMonth()+1} \u00b7 ${fotos.length} p\u00e1g.`;

  bgSetFase(`Leyendo ${fotos.length} foto(s) EN ORDEN...`);

  const statusHTML = fotos.map((_,i) =>
    `<div id="fotoStatus${i}" style="font-size:11px;padding:2px 0;color:var(--textL)"><span class="spinner" style="width:10px;height:10px;border-width:1px"></span> P\u00e1gina ${i+1}...</div>`
  ).join("");
  if (output) output.innerHTML = `
    <div class="card" id="progresoCard">
      <div class="card-title">\ud83d\udcf8 Fase 1/3 \u2014 Transcribiendo ${fotos.length} p\u00e1gina(s) EN ORDEN</div>
      <div style="font-size:11px;color:var(--textL);margin-bottom:8px">Subcarpeta: <b>${esc(sesionNombre)}</b></div>
      <div id="progresoFotos">${statusHTML}</div>
      <div class="prog-bar" style="margin-top:8px"><div id="progresoBar" class="prog-fill" style="width:0%"></div></div>
      <div id="progresoFase" style="font-size:11px;color:var(--gold);margin-top:6px;text-align:center"></div>
    </div>
    <div id="resultadosLotes"></div>`;

  // ===== FASE 1: TRANSCRIPCION SECUENCIAL EN ORDEN (1 a 1, nunca en paralelo) =====
  // Secuencial garantiza orden correcto y evita que las llamadas compitan y se corten.
  const transcripcionesPorFoto = new Array(fotos.length).fill("");
  for (let idx = 0; idx < fotos.length; idx++) {
    try {
      const res = await callClaudeVision([fotos[idx]],
        `Eres un transcriptor de OCR experto. Transcribe ABSOLUTAMENTE TODO el texto visible en esta imagen de apuntes de oposici\u00f3n Polic\u00eda Nacional, tema "${tema.n} \u2014 ${tema.nombre}".

REGLAS ESTRICTAS:
- NO resumas. NO omitas NADA. Copia palabra por palabra.
- Incluye t\u00edtulos, subt\u00edtulos, listas, art\u00edculos, n\u00fameros, plazos, excepciones, notas al margen, todo.
- Si el texto contin\u00faa hasta el borde, transcr\u00edbelo igualmente.
- Formato Markdown: ## t\u00edtulos, ### subt\u00edtulos, - listas, **negrita** t\u00e9rminos clave.
- Si una palabra es ileg\u00edble, escribe [?] pero NO te saltes el resto.

Devuelve SOLO la transcripci\u00f3n, sin comentarios tuyos.`, 3500);
      transcripcionesPorFoto[idx] = res || "";
      bgSetFoto(idx, `<span style="color:var(--green)">\u2705</span> P\u00e1gina ${idx+1} \u2014 ${(res||"").length} caracteres`);
    } catch(e) {
      bgSetFoto(idx, `<span style="color:var(--red)">\u274c</span> P\u00e1gina ${idx+1}: error, reintentando...`);
      // Reintento 1 vez
      try {
        const res2 = await callClaudeVision([fotos[idx]],
          `Transcribe TODO el texto de esta imagen de apuntes (tema ${tema.nombre}). No omitas nada. Formato markdown.`, 3500);
        transcripcionesPorFoto[idx] = res2 || "";
        bgSetFoto(idx, `<span style="color:var(--green)">\u2705</span> P\u00e1gina ${idx+1} (reintento) \u2014 ${(res2||"").length} car.`);
      } catch(e2) {
        bgSetFoto(idx, `<span style="color:var(--red)">\u274c</span> P\u00e1gina ${idx+1}: fall\u00f3`);
      }
    }
    const bar = document.getElementById("progresoBar");
    if (bar) bar.style.width = Math.round((idx+1) / fotos.length * 100) + "%";
  }

  const transcripcionTotal = transcripcionesPorFoto
    .map((t,i) => t ? `=== P\u00c1GINA ${i+1} ===\n${t}` : `=== P\u00c1GINA ${i+1} (no le\u00edda) ===`)
    .join("\n\n");
  const totalChars = transcripcionTotal.length;

  // Guardar transcripcion completa SIEMPRE, en orden
  guardarApunte({ temas:[temaSel], tipo:"resumen", sesionId, sesionNombre,
    titulo:`\ud83d\udcc4 Transcripci\u00f3n completa \u2014 T${temaSel} (${fotos.length} p\u00e1g., ${totalChars} car.)`,
    contenido: transcripcionTotal });

  const resultados = [`\ud83d\udcc4 Transcripci\u00f3n (${totalChars} car., ${fotos.length} p\u00e1g. en orden)`];

  // ===== FASE 2: RESUMEN COMPLETO (secuencial, sin cortar) =====
  bgSetFase(`Fase 2/3 \u2014 Generando resumen completo...`);

  function chunkText(texto, max) {
    if (texto.length <= max) return [texto];
    const chunks = []; let start = 0;
    while (start < texto.length) {
      let end = Math.min(start + max, texto.length);
      if (end < texto.length) { const nl = texto.lastIndexOf("\n", end); if (nl > start + max*0.6) end = nl; }
      chunks.push(texto.slice(start, end)); start = end;
    }
    return chunks;
  }
  const chunks = chunkText(transcripcionTotal, 7000);
  const esLargo = chunks.length > 1;

  if (genResumen) {
    try {
      let resumenFinal;
      if (!esLargo) {
        resumenFinal = await callClaude(`Eres experto en oposici\u00f3n PN. Este es el contenido COMPLETO del tema "${tema.n} \u2014 ${tema.nombre}":\n\n${transcripcionTotal}\n\nGenera un resumen estructurado y COMPLETO. Usa ## para cada secci\u00f3n, - para listas, **negrita** para datos clave (plazos, art\u00edculos, n\u00fameros). NO te dejes ning\u00fan apartado. Cubre TODO el contenido de principio a fin.`, 4000);
      } else {
        // Resumir cada bloque en orden, luego unir (no fusionar con IA para no perder datos)
        const parciales = [];
        for (let ci = 0; ci < chunks.length; ci++) {
          bgSetFase(`Fase 2/3 \u2014 Resumiendo bloque ${ci+1}/${chunks.length}...`);
          const p = await callClaude(`Parte ${ci+1} de ${chunks.length} del tema "${tema.n} \u2014 ${tema.nombre}":\n\n${chunks[ci]}\n\nResume esta parte SIN OMITIR NADA. ## secciones, - listas, **negrita** datos clave. Solo el contenido de esta parte.`, 2500);
          parciales.push(p);
        }
        resumenFinal = parciales.map((p,i) => `${chunks.length > 1 ? `## \u2014 Parte ${i+1} \u2014\n\n` : ""}${p}`).join("\n\n");
      }
      guardarApunte({ temas:[temaSel], tipo:"resumen", sesionId, sesionNombre, titulo:`\ud83d\udccb Resumen completo \u2014 T${temaSel} \u2014 ${tema.nombre}`, contenido:resumenFinal });
      resultados.push("\ud83d\udccb Resumen completo");
    } catch(e) { resultados.push("\u26a0\ufe0f Resumen fall\u00f3: " + e.message.slice(0,40)); }
  }

  // ===== FASE 3: ACRONIMOS AGRUPADOS (una sola llamada con TODO, garantiza agrupaci\u00f3n) =====
  bgSetFase(`Fase 3/3 \u2014 Generando reglas mnemot\u00e9cnicas...`);

  if (genAcronimo) {
    try {
      // Procesar por bloques para extraer TODAS las reglas posibles (no solo unas pocas)
      const bloquesAcro = esLargo ? chunks : [transcripcionTotal];
      const todasDatas = [];
      for (let bi = 0; bi < bloquesAcro.length; bi++) {
        bgSetFase(`Fase 3/3 \u2014 Reglas mnemot\u00e9cnicas, bloque ${bi+1}/${bloquesAcro.length}...`);
        const r = await callClaude(promptAcronimo(0, `${tema.n} \u2014 ${tema.nombre}`, "", temaSel)
          .replace("Tienes el contenido de un apunte sobre", "Tienes parte del contenido sobre")
          + `\n\nExtrae TODAS las listas memorizables que encuentres en este texto (cuantas m\u00e1s reglas \u00fatiles, mejor):\n${bloquesAcro[bi]}`, 4000);
        const cl = r.replace(/```json|```/g,"").trim();
        try { const d = JSON.parse(cl.substring(cl.indexOf("["), cl.lastIndexOf("]")+1)); if(Array.isArray(d)) todasDatas.push(...d); } catch(e){}
      }
      // Filtrar v\u00e1lidos y deduplicar por nombre
      const validas = todasDatas.filter(a => a && a.acronimo && a.items && a.items.length);
      const unicos = validas.filter((a,i) => validas.findIndex(b => b.acronimo === a.acronimo) === i);
      if (unicos.length) {
        const consolidado = unicos.map(a => `**${a.acronimo}** \u2014 ${a.gancho}\n${(a.items||[]).map(it=>`- ${it.letra} \u2192 ${it.clave}${it.extra?" ("+it.extra+")":""}`).join("\n")}`).join("\n\n---\n\n");
        guardarApunte({ temas:[temaSel], tipo:"resumen", sesionId, sesionNombre, titulo:`\ud83d\udd24 Reglas mnemot\u00e9cnicas \u2014 T${temaSel} (${unicos.length})`, contenido:consolidado });
        unicos.forEach(a => guardarApunte({ temas:[temaSel], tipo:"acronimo", sesionId, sesionNombre, titulo:`\ud83d\udd24 ${a.acronimo}`, contenido:JSON.stringify(a) }));
        resultados.push(`\ud83d\udd24 ${unicos.length} regla(s) mnemot\u00e9cnicas`);
        const resList = document.getElementById("resultadosLotes");
        if (resList) resList.innerHTML = unicos.map(a=>`<div style="margin-bottom:10px">${tarjetaAcronimoHTML(a)}</div>`).join("");
      }
    } catch(e) { resultados.push("\u26a0\ufe0f Reglas fallaron"); }
  }

  // Extras secuenciales (test, comic, mnemo) \u2014 cada uno espera al anterior
  if (genTest) {
    try {
      const r = await callClaude(`Examinador PN. Tema "${tema.n} \u2014 ${tema.nombre}". Genera 10 preguntas test nivel real cubriendo todo el contenido. Solo JSON:\n[{"pregunta":"","opciones":{"A":"","B":"","C":""},"correcta":"A","explicacion":""}]\n\n${chunks.slice(0,3).join("\n\n")}`, 3000);
      const cl=r.replace(/```json|```/g,"").trim(); const qs=JSON.parse(cl.substring(cl.indexOf("["),cl.lastIndexOf("]")+1));
      guardarApunte({ temas:[temaSel], tipo:"test", sesionId, sesionNombre, titulo:`\ud83d\udcdd Test \u2014 T${temaSel} (${qs.length} preg.)`, contenido:JSON.stringify(qs) });
      saveState({ fotoTests:[...(STATE.fotoTests||[]),...qs.map(q=>({...q,tema:temaSel}))] });
      resultados.push(`\ud83d\udcdd Test ${qs.length} preg.`);
    } catch(e){}
  }

  if (genComic) {
    try {
      const r = await callClaude(promptComic(0,`${tema.n} \u2014 ${tema.nombre}`,"").replace("L\u00e9elas/l\u00e9elo todo.",`L\u00e9elo todo.\n\nCONTENIDO:\n${chunks.slice(0,2).join("\n\n")}`), 2000);
      guardarApunte({ temas:[temaSel], tipo:"comic", sesionId, sesionNombre, titulo:`\ud83c\udfa8 C\u00f3mic \u2014 T${temaSel}`, contenido:r });
      resultados.push("\ud83c\udfa8 C\u00f3mic");
    } catch(e){}
  }

  if (genMnemo) {
    try {
      const r = await callClaude(`Mnemotecnia Sistema Major PN. Tema "${tema.n}". Extrae el dato num\u00e9rico m\u00e1s importante. Formato:\n## MNEMOTECNIA \u2014 [DATO]\n**DATO:** [...]\n**T\u00c9CNICA:** [...]\n**ESCENA:** [2-3 frases]\n**V\u00cdNCULO:** [1 l\u00ednea]\n\n${chunks[0]}`, 1200);
      guardarApunte({ temas:[temaSel], tipo:"mnemo", sesionId, sesionNombre, titulo:`\ud83e\udde0 Mnemotecnia Major \u2014 T${temaSel}`, contenido:r });
      resultados.push("\ud83e\udde0 Mnemotecnia Major");
    } catch(e){}
  }

  bgFinalizar(resultados);
  apuntesFotos = [];
  renderApuntesFotoThumbs();
  if (currentTab === "apuntes") renderApuntes_();
}

let apuntesFotos = [];


function renderApuntesFotoThumbs() {
  const el = document.getElementById("apuntesFotoThumbs");
  if (!el) return;
  el.innerHTML = apuntesFotos.map((img, i) => `
    <div class="imgthumb">
      <img src="${img.preview}">
      <div class="imgnum">${i+1}</div>
      <button class="imgdel" data-apuntedel="${i}">✕</button>
    </div>`).join("");
  el.querySelectorAll("[data-apuntedel]").forEach(btn => {
    btn.onclick = () => { apuntesFotos.splice(parseInt(btn.dataset.apuntedel), 1); renderApuntesFotoThumbs(); };
  });
  const procBtn = document.getElementById("btnProcesarApuntes");
  if (procBtn) {
    procBtn.style.display = apuntesFotos.length > 0 ? "block" : "none";
    procBtn.textContent = `⚡ Procesar ${apuntesFotos.length} foto(s) → distribuir a todo`;
    procBtn.onclick = procesarApuntesFotos;
  }
}

function bindApuntesCards() {
  document.querySelectorAll("[data-ver-apunte]").forEach(btn => {
    btn.onclick = () => {
      const a = (STATE.apuntes||[]).find(x => x.id === btn.dataset.verApunte);
      if (!a) return;
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,10,20,.92);z-index:999;padding:16px;overflow-y:auto;";
      let cuerpo;
      if (a.tipo === "acronimo") {
        // Renderizar la tarjeta de acrónimo con colores, no el JSON
        try { cuerpo = tarjetaAcronimoHTML(JSON.parse(a.contenido)); }
        catch { cuerpo = "<pre style='white-space:pre-wrap;font-size:12px'>" + esc(a.contenido) + "</pre>"; }
      } else if (["resumen","mnemo","foto","comic"].includes(a.tipo)) {
        cuerpo = '<div style="background:#fff;border-radius:8px;padding:14px;color:#1a2540">' + colorApunte(a.contenido) + "</div>";
      } else {
        cuerpo = "<pre style='white-space:pre-wrap;font-size:12px;color:#1a2540'>" + esc(a.contenido) + "</pre>";
      }
      overlay.innerHTML = '<div style="max-width:600px;margin:0 auto">' +
        '<button id="closeOverlay" style="background:#fff;border:1px solid var(--border);color:var(--navy);padding:8px 14px;border-radius:6px;margin-bottom:12px;font-weight:700">✕ Cerrar</button>' +
        '<div class="card"><div class="card-title">' + (TIPOS_APUNTE[a.tipo]?.icon||"📄") + " " + esc(a.titulo) + "</div>" +
        cuerpo + "</div></div>";
      document.body.appendChild(overlay);
      document.getElementById("closeOverlay").onclick = () => overlay.remove();
    };
  });
  document.querySelectorAll("[data-edit-apunte]").forEach(btn => {
    btn.onclick = () => {
      const a = (STATE.apuntes||[]).find(x => x.id === btn.dataset.editApunte);
      if (!a) return;
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,10,20,.95);z-index:999;padding:16px;overflow-y:auto;";
      overlay.innerHTML = '<div style="max-width:600px;margin:0 auto">' +
        '<div style="font-weight:700;color:var(--gold);margin-bottom:10px">✏️ Editar apunte</div>' +
        '<input id="editTitulo" value="' + esc(a.titulo) + '" style="margin-bottom:8px">' +
        '<textarea id="editContenido" style="min-height:300px">' + esc(a.contenido) + "</textarea>" +
        '<div class="btn-row" style="margin-top:10px">' +
        '<button class="btn btn-ghost sm" id="cancelarEdicion">Cancelar</button>' +
        '<button class="btn btn-primary sm" id="guardarEdicion">💾 Guardar</button></div></div>';
      document.body.appendChild(overlay);
      document.getElementById("cancelarEdicion").onclick = () => overlay.remove();

function bindApuntes() {
  if (apuntesVistaDetalle) {

      } else {
        // Desde tema → volver a raíz
        apuntesVistaDetalle = null;
      }
      renderApuntes_();
    };
    bindApuntesCards();
  } else {
    // ── Hub de fotos ──
    const camBtn = document.getElementById("btnApuntesFotoCamera");
    const galBtn = document.getElementById("btnApuntesFotoGaleria");

    const galInput = document.getElementById("apuntesInputGaleria");

    if (galBtn) galBtn.onclick = () => galInput?.click();
    if (camInput) camInput.onchange = async (e) => {

      e.target.value = "";

      renderApuntesFotoThumbs();
    };
    if (galInput) galInput.onchange = async (e) => {
      const files = Array.from(e.target.files || []);
      e.target.value = "";
      for (const f of files) { try { apuntesFotos.push(await autoDigitalizarFoto(f)); } catch(err){ toast("⚠️ Error leyendo " + f.name); } }
      renderApuntesFotoThumbs();
    };
    renderApuntesFotoThumbs();

    // Guardar estado checkboxes cuando cambian — sobreviven a re-renders
    [{id:"genAcronimo",k:"acronimo"},{id:"genComic",k:"comic"},{id:"genTest",k:"test"},
     {id:"genResumen",k:"resumen"},{id:"genTranscripcion",k:"transcripcion"},{id:"genMnemo",k:"mnemo"}
    ].forEach(({id,k}) => {
      const el = document.getElementById(id);

    const busqEl = document.getElementById("apuntesBusqueda");

    if (busqEl) busqEl.oninput = (e) => { clearTimeout(_busqTimer); _busqTimer = setTimeout(() => { apuntesBusq = e.target.value; renderApuntes_(); }, 220); };
    const filtroTipoEl = document.getElementById("apuntesFiltroTipo");
    if (filtroTipoEl) filtroTipoEl.onchange = (e) => { apuntesFiltroTipo = e.target.value; renderApuntes_(); };
    const filtroTemaEl = document.getElementById("apuntesFiltroTema");
    if (filtroTemaEl) filtroTemaEl.onchange = (e) => { apuntesFiltroTema = e.target.value; renderApuntes_(); };
    // Carpetas
    document.querySelectorAll("[data-apunte-tema]").forEach(el => {
      el.onclick = () => {
        const v = el.dataset.apunteTema;
        apuntesVistaDetalle = { tipo: "tema", temaId: v === "sin" ? "sin" : parseInt(v) };
        renderApuntes_();
      };
    });
    document.querySelectorAll("[data-sesion-id]").forEach(el => {
      el.onclick = () => {
        apuntesVistaDetalle = { tipo: "sesion", sesionId: el.dataset.sesionId, temaId: el.dataset.temaId };
        renderApuntes_();
      };
    });

    // Renombrar sesión
    document.querySelectorAll("[data-rename-ses]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const sesId = btn.dataset.renameSes;
        const actual = btn.dataset.sesNombre;
        const nuevo = prompt("Nombre de la subcarpeta:", actual);
        if (!nuevo || nuevo === actual) return;
        const nuevos = (STATE.apuntes||[]).map(a =>
          a.sesionId === sesId ? { ...a, sesionNombre: nuevo } : a);
        saveState({ apuntes: nuevos });
        toast("✅ Subcarpeta renombrada");
        renderApuntes_();

    // Toggle expandir/colapsar sesión
    document.querySelectorAll("[data-toggle-ses]").forEach(btn => {

}

// #2 SIMULACRO COMPLETO — 50 preguntas, 90 min cronometrados
// ═══════════════════════════════════════════════════════════
let simulacroState = null;

function renderSimulacro() {
  if (!simulacroState || simulacroState.fase === "config") {
    return `
      <div class="card accent">
        <div class="card-title">📋 SIMULACRO DE EXAMEN COMPLETO</div>
        <p style="font-size:12px;color:var(--greyM);margin-bottom:12px">50 preguntas · 90 minutos cronometrados · 3 opciones por pregunta · formato real de oposición PN.</p>
        <label>Bloque de temas</label>
        <select id="simBloque">
          <option value="todos">Todos los bloques</option>
          <option value="J">Solo Jurídico (T1-26)</option>
          <option value="S">Solo Sociología (T27-37)</option>
          <option value="T">Solo Técnico (T38-45)</option>
        </select>
        <label>Número de preguntas</label>
        <select id="simNumPreg">
          <option value="20">20 preguntas (30 min)</option>
          <option value="50" selected>50 preguntas (90 min)</option>
          <option value="100">100 preguntas (120 min)</option>
        </select>
        <button class="btn btn-primary" id="btnIniciarSimulacro">📋 Iniciar simulacro</button>
      </div>`;
  }
  if (simulacroState.fase === "test") {
    const q = simulacroState.preguntas[simulacroState.idx];
    const mins = Math.floor(simulacroState.tiempoRestante / 60);
    const secs = simulacroState.tiempoRestante % 60;
    const colorTiempo = simulacroState.tiempoRestante < 300 ? "var(--red)" : simulacroState.tiempoRestante < 900 ? "var(--gold)" : "var(--green)";
    return `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:700">${simulacroState.idx+1}/${simulacroState.preguntas.length}</span>
        <span style="font-size:16px;font-weight:900;color:${colorTiempo}">⏱ ${mins}:${String(secs).padStart(2,"0")}</span>
        <button class="btn btn-danger sm" id="btnAbandonarSimulacro">Abandonar</button>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${(simulacroState.idx/simulacroState.preguntas.length)*100}%"></div></div>
      <div class="card" style="margin-top:10px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;line-height:1.5">${esc(q.pregunta)}</div>
        ${Object.entries(q.opciones).map(([k,v]) => `
          <button class="btn btn-ghost sm" data-simopt="${k}" style="width:100%;text-align:left;margin-bottom:8px;padding:12px">${k}) ${esc(v)}</button>
        `).join("")}
      </div>`;
  }
  if (simulacroState.fase === "resultado") {
    const total = simulacroState.preguntas.length;
    const correctas = simulacroState.respuestas.filter((r,i) => r === simulacroState.preguntas[i]?.correcta).length;
    const nulas = simulacroState.respuestas.filter(r => !r).length;
    const incorrectas = total - correctas - nulas;
    const nota = Math.max(0, (correctas - incorrectas/3) / total * 10).toFixed(2);
    const aprobado = parseFloat(nota) >= 5;
    return `
      <div class="card accent">
        <div class="card-title">🏁 RESULTADO DEL SIMULACRO</div>
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-n" style="color:${aprobado?"var(--green)":"var(--red)"}">${nota}</div><div class="kpi-l">Nota /10</div></div>
          <div class="kpi"><div class="kpi-n" style="color:var(--green)">${correctas}</div><div class="kpi-l">Correctas</div></div>
          <div class="kpi"><div class="kpi-n" style="color:var(--red)">${incorrectas}</div><div class="kpi-l">Incorrectas</div></div>
          <div class="kpi"><div class="kpi-n" style="color:var(--greyM)">${nulas}</div><div class="kpi-l">En blanco</div></div>
        </div>
        <div style="font-size:13px;font-weight:700;color:${aprobado?"var(--green)":"var(--red)"};text-align:center;margin:10px 0">${aprobado?"✅ APROBADO":"❌ SUSPENDIDO"} · Fórmula: A - I/3 = ${nota}</div>
        <button class="btn btn-primary" id="btnVerCorreccionSimulacro">📋 Ver corrección completa</button>
        <button class="btn btn-secondary" id="btnNuevoSimulacro" style="margin-top:8px">🔄 Nuevo simulacro</button>
      </div>
      ${simulacroState.mostrarCorreccion ? simulacroState.preguntas.map((q,i) => {
        const resp = simulacroState.respuestas[i];
        const ok = resp === q.correcta;
        return `<div class="card" style="border-left:3px solid ${!resp?"var(--greyM)":ok?"var(--green)":"var(--red)"}">
          <div style="font-size:11px;font-weight:700;color:${!resp?"var(--greyM)":ok?"var(--green)":"var(--red)"}">${i+1}. ${!resp?"EN BLANCO":ok?"CORRECTA":"INCORRECTA"}</div>
          <div style="font-size:12px;margin:4px 0">${esc(q.pregunta)}</div>
          ${resp && !ok ? `<div style="font-size:11px;color:var(--red)">Tu respuesta: ${resp}) ${esc(q.opciones[resp]||"")}</div>` : ""}
          <div style="font-size:11px;color:var(--green)">Correcta: ${q.correcta}) ${esc(q.opciones[q.correcta]||"")}</div>
          ${q.explicacion ? `<div style="font-size:11px;color:var(--greyM);margin-top:4px">${esc(q.explicacion)}</div>` : ""}
        </div>`;
      }).join("") : ""}`;
  }
  return "";
}

function bindSimulacro() {
  const btnIni = document.getElementById("btnIniciarSimulacro");
  if (btnIni) btnIni.onclick = async () => {
    const bloque = document.getElementById("simBloque").value;
    const num = parseInt(document.getElementById("simNumPreg").value);
    const btn = btnIni; btn.disabled = true; btn.innerHTML = `<span class="spinner"></span> Generando preguntas...`;
    const temasFiltro = bloque === "todos" ? TEMAS : TEMAS.filter(t => t.b === bloque);
    const temasMuestra = temasFiltro.sort(()=>Math.random()-.5).slice(0, Math.min(10, temasFiltro.length));
    const prompt = `Eres examinador de la oposición a Policía Nacional Escala Básica. Genera exactamente ${num} preguntas tipo test, 3 opciones (A/B/C), nivel real de examen. Temas: ${temasMuestra.map(t=>`T${t.n} ${t.nombre}`).join(", ")}. Responde ÚNICAMENTE con JSON válido sin backticks: [{"pregunta":"texto","opciones":{"A":"","B":"","C":""},"correcta":"A","explicacion":"por qué A es correcta y las demás no"}]`;
    try {
      const res = await callClaude(prompt, 6000);
      const clean = res.replace(/\`\`\`json|\`\`\`/g,"").trim();
      const start = clean.indexOf("["), end = clean.lastIndexOf("]")+1;
      const preguntas = JSON.parse(clean.substring(start, end));
      const tiempoTotal = num <= 20 ? 1800 : num <= 50 ? 5400 : 7200;
      simulacroState = { fase:"test", preguntas, idx:0, respuestas:Array(preguntas.length).fill(null), tiempoRestante: tiempoTotal, timer: null };
      simulacroState.timer = setInterval(() => {
        simulacroState.tiempoRestante--;
        if (simulacroState.tiempoRestante <= 0) { clearInterval(simulacroState.timer); simulacroState.fase="resultado"; }
        const timerEl = document.querySelector("[data-simtimer]");
        if (timerEl) {
          const m = Math.floor(simulacroState.tiempoRestante/60), s = simulacroState.tiempoRestante%60;
          const c = simulacroState.tiempoRestante < 300 ? "var(--red)" : simulacroState.tiempoRestante < 900 ? "var(--gold)" : "var(--green)";
          timerEl.textContent = `⏱ ${m}:${String(s).padStart(2,"0")}`;
          timerEl.style.color = c;
        }
        if (simulacroState.tiempoRestante <= 0) renderSimulacro_();
      }, 1000);
      renderSimulacro_();
    } catch(e) { toast("⚠️ Error generando preguntas. Inténtalo de nuevo."); btn.disabled=false; btn.innerHTML="📋 Iniciar simulacro"; }
  };
  const btnAban = document.getElementById("btnAbandonarSimulacro");
  if (btnAban) btnAban.onclick = () => { if(simulacroState?.timer) clearInterval(simulacroState.timer); simulacroState={fase:"resultado", preguntas:simulacroState.preguntas, respuestas:simulacroState.respuestas}; renderSimulacro_(); };
  document.querySelectorAll("[data-simopt]").forEach(btn => {
    btn.onclick = () => {
      simulacroState.respuestas[simulacroState.idx] = btn.dataset.simopt;
      simulacroState.idx++;
      if (simulacroState.idx >= simulacroState.preguntas.length) { clearInterval(simulacroState.timer); simulacroState.fase="resultado"; }
      renderSimulacro_();
    };
  });
  const btnVer = document.getElementById("btnVerCorreccionSimulacro");
  if (btnVer) btnVer.onclick = () => { simulacroState.mostrarCorreccion = !simulacroState.mostrarCorreccion; renderSimulacro_(); };
  const btnNuevo = document.getElementById("btnNuevoSimulacro");
  if (btnNuevo) btnNuevo.onclick = () => { simulacroState = {fase:"config"}; renderSimulacro_(); };
}
function renderSimulacro_() { document.getElementById("content").innerHTML = renderSimulacro(); bindSimulacro(); }

// #54 CALCULADORA DE RITMOS DE CARRERA
// ═══════════════════════════════════════════════════════════
function calcularRitmosCarrera(tiempo1kmSeg) {
  const base = tiempo1kmSeg;
  return {
    "Z1 Recuperación (70%)": Math.round(base / 0.70),
    "Z2 Base aeróbica (80%)": Math.round(base / 0.80),
    "Z3 Tempo (90%)": Math.round(base / 0.90),
    "Series 400m (105%)": Math.round(base / 1.05),
    "Series 200m (110%)": Math.round(base / 1.10),
    "1km objetivo": base,
  };
}
function fmtRitmo(seg) { const m = Math.floor(seg/60); return `${m}:${String(seg%60).padStart(2,"0")} min/km`; }
